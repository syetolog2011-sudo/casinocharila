<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Case Opener + Inventory</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #1a1a1c;
            --accent: #47a1ff;
            --epic: #f1c40f;
            --rare: #3498db;
            --common: #95a5a6;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 25px; }
        .balance { color: var(--accent); font-weight: bold; font-size: 20px; }

        /* Рулетка */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 160px;
            background: #0f0f11;
            border: 2px solid #222;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .center-line {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 100%;
            background: #fff;
            z-index: 10;
            box-shadow: 0 0 15px #fff;
        }

        .tape {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 10px;
            transition: transform 5s cubic-bezier(0.15, 0, 0.05, 1);
        }

        .nft-card {
            min-width: 125px;
            height: 125px;
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border-bottom: 5px solid #333;
            flex-shrink: 0;
        }

        .nft-card img { width: 100%; height: 100%; object-fit: cover; }
        .nft-card.epic { border-color: var(--epic); }
        .nft-card.rare { border-color: var(--rare); }
        .nft-card.common { border-color: var(--common); }

        /* Модальное окно (Выпадение) */
        #winModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s;
        }

        .win-content {
            background: #1a1a1c;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid #333;
            max-width: 280px;
        }

        .win-img { width: 200px; height: 200px; border-radius: 20px; object-fit: cover; margin-bottom: 15px; border: 4px solid #fff; }

        /* Кнопки */
        .btn {
            width: 100%; max-width: 400px; padding: 20px;
            background: #fff; color: #000; border: none;
            border-radius: 20px; font-weight: 900; margin-top: 20px; cursor: pointer;
        }
        .btn-sell { background: #e74c3c; color: white; margin-top: 10px; }
        .btn-collect { background: #2ecc71; color: white; }

        /* Инвентарь */
        .inventory-section { width: 100%; max-width: 500px; margin-top: 40px; }
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .inv-item { width: 100%; aspect-ratio: 1/1; background: #1a1a1c; border-radius: 12px; overflow: hidden; border-bottom: 3px solid #333; }
        .inv-item img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <h2>КЕЙС «FROZEN» ❄️</h2>
        <div class="balance">БАЛАНС: <span id="coins">1000</span> ⭐</div>
    </div>

    <div class="roulette-wrapper">
        <div class="center-line"></div>
        <div class="tape" id="tape"></div>
    </div>

    <button class="btn" id="spinBtn" onclick="startSpin()">ОТКРЫТЬ (100 ⭐)</button>

    <div class="inventory-section">
        <h3>МОЙ ИНВЕНТАРЬ</h3>
        <div id="inventory" class="inventory-grid"></div>
    </div>

    <div id="winModal">
        <div class="win-content" id="winContent">
            </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const tape = document.getElementById('tape');
        const inventoryEl = document.getElementById('inventory');
        let balance = 1000;
        let userInventory = [];

        const prices = { 'common': 20, 'rare': 125, 'epic': 525 };

        const items = [
            { img: 'https://raw.githubusercontent.com/syetolog2011-sudo/casinocharila/main/photo_5296748618452769416_m.jpg', rarity: 'epic' },
            { img: 'https://raw.githubusercontent.com/syetolog2011-sudo/casinocharila/main/photo_5296748618452769469_m (1).jpg', rarity: 'rare' },
            { img: 'https://raw.githubusercontent.com/syetolog2011-sudo/casinocharila/main/photo_5296748618452769466_m.jpg', rarity: 'common' }
        ];

        function buildTape() {
            tape.innerHTML = '';
            for (let i = 0; i < 80; i++) {
                const item = items[Math.floor(Math.random() * items.length)];
                const card = document.createElement('div');
                card.className = `nft-card ${item.rarity}`;
                card.innerHTML = `<img src="${item.img}">`;
                tape.appendChild(card);
            }
        }

        function startSpin() {
            if (balance < 100) return alert("Недостаточно звезд!");
            
            balance -= 100;
            updateUI();
            
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;

            const cardWidth = 137;
            const winIndex = 60; 
            // Случайно выбираем, какой предмет выиграет
            const winningItem = items[Math.floor(Math.random() * items.length)];
            
            // Подменяем 60-ю карточку на выигрышную
            const cards = tape.querySelectorAll('.nft-card');
            cards[winIndex].className = `nft-card ${winningItem.rarity}`;
            cards[winIndex].innerHTML = `<img src="${winningItem.img}">`;

            const offset = (winIndex * cardWidth) - (tape.parentElement.offsetWidth / 2) + (cardWidth / 2);

            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                tape.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.05, 1)';
                tape.style.transform = `translateX(-${offset}px)`;
            }, 50);

            setTimeout(() => showWinModal(winningItem), 5500);
        }

        function showWinModal(item) {
            const modal = document.getElementById('winModal');
            const content = document.getElementById('winContent');
            const price = prices[item.rarity];

            content.innerHTML = `
                <h2 style="color:var(--${item.rarity})">${item.rarity.toUpperCase()}</h2>
                <img src="${item.img}" class="win-img" style="border-color:var(--${item.rarity})">
                <p>Цена продажи: ${price} ⭐</p>
                <button class="btn btn-collect" onclick="collectItem('${item.img}', '${item.rarity}')">В ИНВЕНТАРЬ</button>
                <button class="btn btn-sell" onclick="sellItem(${price})">ПРОДАТЬ ЗА ${price} ⭐</button>
            `;
            modal.style.display = 'flex';
        }

        function collectItem(img, rarity) {
            userInventory.push({ img, rarity });
            closeModal();
            renderInventory();
        }

        function sellItem(price) {
            balance += price;
            updateUI();
            closeModal();
        }

        function closeModal() {
            document.getElementById('winModal').style.display = 'none';
            document.getElementById('spinBtn').disabled = false;
            buildTape();
        }

        function updateUI() {
            document.getElementById('coins').innerText = balance;
        }

        function renderInventory() {
            inventoryEl.innerHTML = '';
            userInventory.forEach(item => {
                const div = document.createElement('div');
                div.className = `inv-item`;
                div.style.borderColor = `var(--${item.rarity})`;
                div.innerHTML = `<img src="${item.img}">`;
                inventoryEl.appendChild(div);
            });
        }

        buildTape();
    </script>
</body>
</html>
