<div id="screen-crash" class="screen" style="padding-top: 0;">
    <div class="crash-container">
        <div class="nav-header" style="margin-top: 80px;">
            <span class="close-btn" onclick="openScreen('screen-main')">✕ Выход</span>
            <h3 style="margin:0">Crash Game</h3>
            <div></div>
        </div>

        <div class="crash-main-area">
            <div class="rocket-wrapper">
                <video id="rocket-video" class="rocket-static" autoplay loop muted playsinline>
                    <source src="13878839675461.mp4" type="video/mp4">
                </video>
            </div>

            <div class="crash-info">
                <div class="multiplier-display" id="crash-mult">1.00x</div>
            </div>
        </div>

        <div class="crash-controls">
            <div class="bet-input-group">
                <input type="number" id="crash-bet" value="10" min="1">
                <button class="spin-btn" id="crash-btn" onclick="startCrash()">СТАВКА</button>
            </div>
        </div>
    </div>
</div>

<style>
    .crash-container {
        width: 100%; height: 100%;
        background: #1f0e00; /* Твой фон */
        display: flex; flex-direction: column; align-items: center;
    }

    .crash-main-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 100%;
    }

    /* Обертка для ракеты, чтобы она стояла на месте */
    .rocket-wrapper {
        width: 120px;
        height: 120px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 20px;
    }

    .rocket-static {
        width: 100%;
        height: 100%;
        object-fit: contain;
        /* Только эффект вибрации, без перемещения */
        animation: rocket-vibration 0.1s infinite alternate;
        mix-blend-mode: screen;
    }

    /* Эффект дрожания двигателя */
    @keyframes rocket-vibration {
        from { transform: translateY(0) scale(1); }
        to { transform: translateY(-2px) scale(1.02); }
    }

    .multiplier-display {
        font-size: 64px;
        font-weight: 900;
        color: #ff9f43;
        text-shadow: 0 0 30px rgba(255, 159, 67, 0.4);
        font-family: 'Courier New', Courier, monospace;
    }

    .crash-controls {
        width: 100%;
        padding-bottom: 60px;
        display: flex;
        justify-content: center;
    }

    .bet-input-group {
        width: 80%;
        display: flex;
        gap: 10px;
    }

    #crash-bet {
        background: #2a1500;
        border: 1px solid #ff9f43;
        border-radius: 12px;
        color: white;
        padding: 10px;
        width: 80px;
        font-size: 18px;
        text-align: center;
    }

    .spin-btn {
        flex: 1;
        background: #ff9f43;
        border: none;
        border-radius: 12px;
        color: #1f0e00;
        font-weight: bold;
        font-size: 18px;
        cursor: pointer;
    }
</style>

<script>
    let crashActive = false;
    let crashVal = 1.00;
    let crashTimer;

    function startCrash() {
        if (crashActive) return;

        // Проверка баланса (используем твой баланс из прошлых шагов)
        let bet = parseInt(document.getElementById('crash-bet').value);
        if (currentBalance < bet) return; 

        currentBalance -= bet;
        document.getElementById('user-balance').innerText = currentBalance;

        crashActive = true;
        crashVal = 1.00;
        const btn = document.getElementById('crash-btn');
        const display = document.getElementById('crash-mult');
        
        btn.innerText = 'ЗАБРАТЬ';
        btn.style.background = '#4cd137'; // Зеленая кнопка во время полета
        btn.onclick = cashOut;

        crashTimer = setInterval(() => {
            // Скорость роста иксов
            crashVal += 0.01 + (crashVal * 0.002); 
            display.innerText = crashVal.toFixed(2) + 'x';

            // Шанс "краша"
            if (Math.random() < 0.015) {
                boom();
            }
        }, 100);
    }

    function cashOut() {
        if (!crashActive) return;
        
        let win = Math.floor(parseInt(document.getElementById('crash-bet').value) * crashVal);
        currentBalance += win;
        document.getElementById('user-balance').innerText = currentBalance;
        
        resetCrash('ВЫИГРЫШ!');
    }

    function boom() {
        resetCrash('BOOM!');
        document.getElementById('crash-mult').style.color = '#ff4d4d';
    }

    function resetCrash(msg) {
        clearInterval(crashTimer);
        crashActive = false;
        const btn = document.getElementById('crash-btn');
        btn.innerText = 'СТАВКА';
        btn.style.background = '#ff9f43';
        btn.onclick = startCrash;
        
        setTimeout(() => {
            document.getElementById('crash-mult').style.color = '#ff9f43';
        }, 2000);
    }
</script>
