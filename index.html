<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Game</title>
    <style>
        body {
            background-color: #000033; /* Твой темно-синий */
            margin: 0; padding: 0;
            font-family: -apple-system, system-ui, sans-serif;
            color: white;
            height: 100vh; overflow: hidden;
        }

        /* Шапка со звездами */
        .header {
            padding: 15px; display: flex; justify-content: center;
            background: rgba(0, 0, 0, 0.2);
        }
        .balance {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: bold;
        }

        /* Страницы */
        .page { display: none; padding: 20px; height: calc(100vh - 80px); overflow-y: auto; box-sizing: border-box; }
        .page.active { display: block; }

        /* Большие кнопки на главной */
        .main-btn {
            width: 100%; height: 140px;
            border-radius: 30px; margin-bottom: 20px;
            display: flex; align-items: center; padding: 0 25px;
            box-sizing: border-box; border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.1s; -webkit-tap-highlight-color: transparent;
        }
        .main-btn:active { transform: scale(0.96); }

        .bg-roulette { background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%); }
        .bg-upgrade { background: linear-gradient(90deg, #d35400 0%, #e67e22 100%); }

        /* Список кейсов (подарков) внутри рулетки */
        .case-item {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 10px; padding: 15px;
            border-radius: 20px; display: flex; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .case-img { width: 50px; height: 50px; margin-right: 15px; }

        .btn-back {
            background: rgba(255,255,255,0.1); border: none; color: #fff;
            padding: 10px 20px; border-radius: 12px; margin-bottom: 20px;
        }

        h2 { margin-top: 0; font-size: 28px; }
        .icon-lg { font-size: 40px; margin-right: 20px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="balance">⭐ 1,500</div>
    </header>

    <div id="home" class="page active">
        <div class="main-btn bg-roulette" onclick="go('roulette-list')">
            <span class="icon-lg">🎁</span>
            <div>
                <b style="font-size: 24px;">Рулетка</b><br>
                <span style="opacity: 0.7;">Открыть подарки</span>
            </div>
        </div>

        <div class="main-btn bg-upgrade" onclick="go('upgrade-screen')">
            <span class="icon-lg">⚡</span>
            <div>
                <b style="font-size: 24px;">Апгрейд</b><br>
                <span style="opacity: 0.7;">Улучши свои подарки</span>
            </div>
        </div>
    </div>

    <div id="roulette-list" class="page">
        <button class="btn-back" onclick="go('home')">← Назад</button>
        <h2>Выбери подарок</h2>
        
        <div class="case-item" onclick="alert('Запуск рулетки 1')">
            <img src="case1.png" class="case-img" alt="📦">
            <div><b>Обычный подарок</b><br><small>100 ⭐</small></div>
        </div>

        <div class="case-item" onclick="alert('Запуск рулетки 2')">
            <img src="case2.png" class="case-img" alt="🎁">
            <div><b>Редкий подарок</b><br><small>500 ⭐</small></div>
        </div>

        <div class="case-item" onclick="alert('Запуск рулетки 3')">
            <img src="case3.png" class="case-img" alt="💎">
            <div><b>Эпик подарок</b><br><small>1,500 ⭐</small></div>
        </div>
    </div>

    <div id="upgrade-screen" class="page">
        <button class="btn-back" onclick="go('home')">← Назад</button>
        <h2>Апгрейд</h2>
        <p style="opacity: 0.5;">Здесь будет твоя полоска улучшения...</p>
    </div>

    <script>
        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
