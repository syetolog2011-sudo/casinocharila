<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Mobile Game</title>
    <style>
        html, body {
            background-color: #02132f !important; 
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            color: white;
        }

        /* ПАНЕЛЬ БАЛАНСА */
        .top-bar {
            width: 100%;
            display: flex; justify-content: center;
            padding: 20px 0;
        }

        .balance-item {
            background: #1c253d;
            border-radius: 25px;
            padding: 4px 10px 4px 8px;
            display: flex; align-items: center; gap: 6px;
            height: 38px; border: 1px solid rgba(255,255,255,0.1);
        }

        .star-box { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
        .balance-text { font-weight: 800; font-size: 18px; margin: 0 4px; }
        .plus-btn {
            background: #3b82f6; width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none;
        }

        /* ЭКРАНЫ */
        .screen {
            width: 90%;
            max-width: 400px;
            display: none;
            flex-direction: column;
            margin-top: 10px;
        }
        .active { display: flex; }

        /* ГЛАВНОЕ МЕНЮ */
        .game-btn {
            width: 100%; cursor: pointer; border-radius: 20px;
            overflow: hidden; margin-bottom: 15px;
        }
        .game-btn img { width: 100%; height: auto; display: block; }

        /* ЭКРАН РУЛЕТКИ (СЕТКА КЕЙСОВ) */
        .roulette-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .close-btn { font-size: 24px; cursor: pointer; opacity: 0.7; }

        .cases-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 колонки как на скрине */
            gap: 15px;
        }

        .case-card {
            background: #2a2f3d; /* Цвет карточки со скрина */
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .case-img {
            width: 80%;
            height: auto;
            margin-bottom: 10px;
            min-height: 80px;
            background: rgba(255,255,255,0.05); /* Заглушка под картинку */
            border-radius: 10px;
        }

        .case-name { font-size: 16px; font-weight: 600; margin-bottom: 10px; width: 100%; text-align: left; }

        .case-price {
            display: flex; align-items: center; gap: 5px;
            align-self: flex-start;
        }

        /* Маленькая звезда в цене */
        .price-star { width: 14px; height: 14px; }

        .price-val { font-weight: bold; color: #ffca28; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="balance-item">
            <div class="star-box">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L15 9H22L16.5 13.5L18.5 21L12 17L5.5 21L7.5 13.5L2 9H9L12 2Z" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>
                </svg>
            </div>
            <span class="balance-text">125</span>
            <button class="plus-btn" onclick="alert('Магазин')">
                <svg width="14" height="14" viewBox="0 0 12 12" fill="none"><path d="M6 2V10M2 6H10" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>
            </button>
        </div>
    </div>

    <div id="main-menu" class="screen active">
        <div class="game-btn" onclick="openScreen('roulette-screen')">
            <img src="ruletka.jpg" alt="Рулетка">
        </div>
        <div class="game-btn" onclick="alert('Скоро будет')">
            <img src="upgrade.jpg" alt="Апгрейд">
        </div>
    </div>

    <div id="roulette-screen" class="screen">
        <div class="roulette-header">
            <h2 style="margin: 0;">Рулетка</h2>
            <span class="close-btn" onclick="openScreen('main-menu')">✕</span>
        </div>

        <div class="cases-grid">
            <div class="case-card">
                <img src="case1.webp" alt="" class="case-img" onerror="this.style.opacity='0.3'">
                <div class="case-name">Bear</div>
                <div class="case-price">
                    <img src="star.png" class="price-star" alt="⭐" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1828/1828884.png'">
                    <span class="price-val">199</span>
                </div>
            </div>

            <div class="case-card">
                <img src="case2.png" alt="" class="case-img" onerror="this.style.opacity='0.3'">
                <div class="case-name">Player</div>
                <div class="case-price">
                    <img src="star.png" class="price-star" alt="⭐" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1828/1828884.png'">
                    <span class="price-val">199</span>
                </div>
            </div>

            <div class="case-card">
                <img src="case3.png" alt="" class="case-img" onerror="this.style.opacity='0.3'">
                <div class="case-name">Skull</div>
                <div class="case-price">
                    <img src="star.png" class="price-star" alt="⭐" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1828/1828884.png'">
                    <span class="price-val">249</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
    </script>
</body>
</html>
