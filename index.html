<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Mobile Game</title>
    <style>
        html, body {
            background-color: #02132f !important; 
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            -webkit-user-select: none;
        }

        /* ПАНЕЛЬ БАЛАНСА */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 25px 0 15px 0;
        }

        .balance-item {
            background: #1c253d;
            border-radius: 25px;
            padding: 4px 10px 4px 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            height: 38px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* ТВОЯ ЗВЕЗДА КОДОМ (никогда не пропадет) */
        .star-box {
            width: 24px; /* Размер чуть больше текста */
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .balance-text { 
            color: white; 
            font-weight: 800; 
            font-size: 18px; 
            margin: 0 4px;
        }

        /* СИНИЙ ПЛЮСИК */
        .plus-btn {
            background: #3b82f6;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            padding: 0;
        }

        /* КНОПКИ (СТРОГО JPG) */
        .menu-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .game-btn {
            width: 100%;
            cursor: pointer;
            border-radius: 20px;
            overflow: hidden;
            background: #1c253d;
        }

        .game-btn img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="balance-item">
            <div class="star-box">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L15 9H22L16.5 13.5L18.5 21L12 17L5.5 21L7.5 13.5L2 9H9L12 2Z" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>
                    <rect x="11" y="7" width="2" height="2" fill="white" fill-opacity="0.5"/>
                </svg>
            </div>
            
            <span class="balance-text">125</span>
            
            <button class="plus-btn" onclick="alert('Магазин')">
                <svg width="14" height="14" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 2V10M2 6H10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="menu-container">
        <div class="game-btn" onclick="alert('Рулетка!')">
            <img src="ruletka.jpg" alt="Рулетка">
        </div>

        <div class="game-btn" onclick="alert('Апгрейд!')">
            <img src="upgrade.jpg" alt="Апгрейд">
        </div>
    </div>

</body>
</html>
