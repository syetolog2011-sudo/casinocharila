<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gift Casino Fix</title>
    <style>
        :root { --tg-blue: #0088cc; --bg-dark: #0f1012; --card-bg: #1c1c1e; }
        body { background: var(--bg-dark); color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; }

        .header { padding: 12px; display: flex; align-items: center; gap: 6px; font-weight: bold; font-size: 18px; }
        .star-mini { width: 14px; height: 14px; object-fit: contain; }

        .tab-content { display: none; height: calc(100vh - 120px); flex-direction: column; align-items: center; justify-content: center; }
        .tab-content.active { display: flex; }

        /* --- КЕЙСЫ --- */
        .roulette-wrapper { position: relative; width: 100%; height: 140px; background: #161618; border-top: 1px solid #222; border-bottom: 1px solid #222; overflow: hidden; margin-top: 20px; }
        .pointer { position: absolute; left: 50%; height: 100%; width: 2px; background: var(--tg-blue); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 8px var(--tg-blue); }
        .track { display: flex; position: absolute; top: 15px; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .slot { min-width: 100px; display: flex; flex-direction: column; align-items: center; margin: 0 8px; }
        .slot img { width: 65px; height: 65px; object-fit: contain; }
        .p-badge { background: rgba(255,255,255,0.06); padding: 3px 10px; border-radius: 12px; font-size: 11px; margin-top: 8px; display: flex; align-items: center; gap: 3px; color: #ccc; }

        /* --- АПГРЕЙД --- */
        .up-slots { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
        .up-box { width: 90px; height: 90px; background: #1c1c1e; border: 1.5px dashed #333; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .up-box img { width: 60px; height: 60px; object-fit: contain; }
        .chance-val { font-size: 1.2rem; font-weight: 800; color: #00ff88; margin-bottom: 10px; }
        
        .bar-container { position: relative; width: 85%; height: 34px; background: #262628; border-radius: 17px; overflow: hidden; border: 1px solid #333; }
        .green-zone { height: 100%; background: #00ff88; width: 0%; transition: width 0.3s; }
        
        /* Та самая палка (бегущая прямо) */
        .up-arrow { 
            position: absolute; top: 0; left: -10px; width: 4px; height: 100%; 
            background: white; box-shadow: 0 0 10px white; z-index: 10; 
        }

        /* Кнопки */
        .btn-oval { width: 85%; padding: 14px; border-radius: 50px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-blue { background: var(--tg-blue); color: white; margin-top: auto; margin-bottom: 20px; }
        .btn-up { background: linear-gradient(90deg, #00d2ff, #0045ff); color: white; margin-top: 20px; }
        .btn-up:disabled { background: #333; color: #666; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #161618; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .nav-item { color: #888; font-size: 12px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--tg-blue); }

        /* Модалка выигрыша */
        #win-modal { display: none; position: fixed; inset: 0; background: radial-gradient(circle at center, #1a2a3a 0%, #000 100%); z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .win-img { width: 150px; height: 150px; transform: scale(0); animation: pop 0.5s forwards cubic-bezier(0.17, 0.89, 0.32, 1.3); }
        @keyframes pop { to { transform: scale(1); } }
        .win-name { font-size: 22px; font-weight: bold; margin-top: 15px; }

        #select-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; }
        .grid { background: #1c1c1e; padding: 15px; border-radius: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 90%; }
        .grid-item { background: #262628; padding: 10px; border-radius: 10px; text-align: center; }
        .grid-item img { width: 50px; height: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://lztcdn.com/files/c51dbff1-7e57-4ce8-ad0c-efc56255fd3a.webp" class="star-mini">
        <span id="bal">15,000</span>
    </div>

    <div id="tab-cases" class="tab-content active">
        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <div class="track" id="track"></div>
        </div>
        <button class="btn-oval btn-blue" id="spin-btn" onclick="spin()">Открыть за 500 ⭐</button>
    </div>

    <div id="tab-upgrade" class="tab-content">
        <div class="up-slots">
            <div class="up-box" id="slot-from" onclick="openMenu('from')">
                <span style="font-size: 10px; color: #666;">ТВОЙ</span>
            </div>
            <span style="font-size: 20px;">⚡</span>
            <div class="up-box" id="slot-to" onclick="openMenu('to')">
                <span style="font-size: 10px; color: #666;">ЦЕЛЬ</span>
            </div>
        </div>
        <div class="chance-val" id="chance-txt">Шанс: 0%</div>
        <div class="bar-container">
            <div class="green-zone" id="green-bar"></div>
            <div class="up-arrow" id="up-arrow"></div>
        </div>
        <button class="btn-oval btn-up" id="up-btn" onclick="runUpgrade()" disabled>UPGRADE</button>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="tab('tab-cases', this)">🎁<br>Кейсы</div>
        <div class="nav-item" onclick="tab('tab-upgrade', this)">⚡<br>Апгрейд</div>
    </nav>

    <div id="win-modal">
        <img src="" id="w-img" class="win-img">
        <div class="win-name" id="w-name"></div>
        <div style="color: #888; font-size: 14px; margin-top: 5px; display: flex; align-items: center; gap: 4px; justify-content: center;">
            Worth <span id="w-price"></span> <img src="https://lztcdn.com/files/c51dbff1-7e57-4ce8-ad0c-efc56255fd3a.webp" class="star-mini">
        </div>
        <div style="width: 85%; margin-top: 30px;">
            <button class="btn-oval btn-blue" style="width: 100%;" onclick="closeWin()">Продолжить</button>
        </div>
    </div>

    <div id="select-modal" onclick="this.style.display='none'">
        <div class="grid" id="grid" onclick="event.stopPropagation()"></div>
    </div>

    <script>
        const my_star = "https://lztcdn.com/files/c51dbff1-7e57-4ce8-ad0c-efc56255fd3a.webp";
        const items = [
            {p:270, u:'https://storage.portal-market.com/portals-market/gifts/chillflame/models/png/losangeles.png'},
            {p:274, u:'https://storage.portal-market.com/portals-market/gifts/vicecream/models/png/pumpkinspice.png'},
            {p:284, u:'https://storage.portal-market.com/portals-market/gifts/xmasstocking/models/png/abandoned.png'},
            {p:424, u:'https://storage.portal-market.com/portals-market/gifts/timelessbook/models/png/animator.png'},
            {p:837, u:'https://storage.portal-market.com/portals-market/gifts/jinglebells/models/png/antique.png'}
        ].map(i => ({...i, n: i.u.split('/').pop().replace('.png', '')}));

        let balance = 15000;
        let inventory = []; 
        let selFrom = null, selTo = null;

        // Генерация ленты кейса
        const track = document.getElementById('track');
        for(let i=0; i<60; i++){
            const item = items[i % items.length];
            const div = document.createElement('div');
            div.className = 'slot';
            div.innerHTML = `<img src="${item.u}"><div class="p-badge">${item.p} <img src="${my_star}" class="star-mini"></div>`;
            track.appendChild(div);
        }

        function tab(id, el){
            document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function spin(){
            if(balance < 500) return;
            balance -= 500;
            document.getElementById('bal').innerText = balance.toLocaleString();
            document.getElementById('spin-btn').disabled = true;

            const winIdx = 40 + Math.floor(Math.random() * 10);
            const won = items[winIdx % items.length];
            const offset = (winIdx * 116) - (window.innerWidth / 2) + 58;

            track.style.transition = "transform 5s cubic-bezier(0.1, 0, 0.1, 1)";
            track.style.transform = `translateX(-${offset}px)`;

            setTimeout(() => {
                inventory.push(won);
                document.getElementById('w-img').src = won.u;
                document.getElementById('w-name').innerText = won.n;
                document.getElementById('w-price').innerText = won.p;
                document.getElementById('win-modal').style.display = 'flex';
            }, 5500);
        }

        function closeWin(){
            document.getElementById('win-modal').style.display = 'none';
            document.getElementById('spin-btn').disabled = false;
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
        }

        function openMenu(mode){
            const list = mode === 'from' ? inventory : items;
            const grid = document.getElementById('grid');
            grid.innerHTML = list.length ? '' : '<div style="grid-column:1/4; color:#666">Пусто</div>';
            list.forEach(i => {
                const d = document.createElement('div');
                d.className = 'grid-item';
                d.innerHTML = `<img src="${i.u}"><div style="font-size:10px; color:#00ff88">${i.p} ⭐</div>`;
                d.onclick = () => {
                    if(mode==='from') selFrom = i; else selTo = i;
                    document.getElementById(`slot-${mode}`).innerHTML = `<img src="${i.u}"><div style="font-size:10px; color:#00ff88">${i.p} ⭐</div>`;
                    document.getElementById('select-modal').style.display = 'none';
                    updateChance();
                };
                grid.appendChild(d);
            });
            document.getElementById('select-modal').style.display = 'flex';
        }

        function updateChance(){
            if(selFrom && selTo){
                let chance = (selFrom.p / selTo.p) * 100;
                if(chance > 95) chance = 95;
                document.getElementById('chance-txt').innerText = `Шанс: ${chance.toFixed(1)}%`;
                document.getElementById('green-bar').style.width = chance + '%';
                document.getElementById('up-btn').disabled = false;
            }
        }

        function runUpgrade() {
            const btn = document.getElementById('up-btn');
            const arrow = document.getElementById('up-arrow');
            btn.disabled = true;

            const finalPos = Math.random() * 100;
            const duration = 5000;
            const startTime = performance.now();

            // Анимация бегущей в одну сторону палки
            function animateArrow(time) {
                let elapsed = time - startTime;
                let progress = elapsed / duration;
                
                if (progress < 1) {
                    // Эффект "бежит и возвращается с другой стороны" (через остаток от деления)
                    // (progress * 500) % 100 заставляет стрелку пробежать экран 5 раз
                    let currentPos = (progress * 500) % 100;
                    arrow.style.left = currentPos + '%';
                    requestAnimationFrame(animateArrow);
                } else {
                    arrow.style.left = finalPos + '%';
                    finishUpgrade(finalPos);
                }
            }
            requestAnimationFrame(animateArrow);
        }

        function finishUpgrade(finalPos) {
            let chance = (selFrom.p / selTo.p) * 100;
            if(finalPos <= chance) {
                alert("УСПЕХ! 🎉");
                inventory.push(selTo);
            } else {
                alert("СГОРЕЛ... 💀");
            }
            inventory = inventory.filter(i => i !== selFrom);
            location.reload(); // Перезагрузка для сброса
        }
    </script>
</body>
</html>
