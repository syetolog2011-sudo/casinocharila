    <title>NFT Game - Stage 2</title>
    <style>
        /* Устанавливаем твой фон */
        body {
            background-color: #000033; /* Тот самый глубокий синий */
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: -apple-system, system-ui, sans-serif;
            color: white;
            overflow: hidden;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* Шапка со звездами (для ориентира) */
        .top-bar {
            width: 100%;
            text-align: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }
        .stars-display {

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            text-align: center;
        }

        /* ⚡ ЗОНА АПГРЕЙДА */
        .upgrade-section {
            width: 100%;
            flex: 1; /* Занимает оставшееся место */

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            text-align: center;
        }
