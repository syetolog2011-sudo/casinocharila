<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Item Case</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 180px;
            border: 2px solid #333;
            background: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: inset 0 0 30px #000;
        }

        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: #00d2ff;
            z-index: 10;
            box-shadow: 0 0 15px #00d2ff;
        }

        .roulette-track {
            display: flex;
            position: absolute;
            top: 15px;
            left: 0;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .item {
            min-width: 130px;
            height: 130px;
            margin: 10px;
            background: #252525;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 4px solid #444;
        }

        .item img {
            width: 90px;
            height: 90px;
            object-fit: contain;
        }

        .btn-open {
            margin-top: 40px;
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #00d2ff, #0045ff);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 210, 255, 0.3);
        }

        .btn-open:disabled {
            filter: grayscale(1);
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div class="roulette-track" id="track"></div>
    </div>

    <button class="btn-open" id="spinBtn" onclick="spin()">ОТКРЫТЬ КЕЙС</button>

    <script>
        const track = document.getElementById('track');
        const btn = document.getElementById('spinBtn');
        
        // Твои ссылки
        const images = [
            "https://storage.portal-market.com/portals-market/gifts/chillflame/models/png/losangeles.png",
            "https://storage.portal-market.com/portals-market/gifts/vicecream/models/png/pumpkinspice.png",
            "https://storage.portal-market.com/portals-market/gifts/xmasstocking/models/png/abandoned.png"
        ];
        
        const totalItems = 60; // Длина ленты
        const winIndex = 50;   // Какой предмет выиграет

        // Заполняем ленту
        for (let i = 0; i < totalItems; i++) {
            const item = document.createElement('div');
            item.className = 'item';
            
            // Выбираем картинку по кругу из нашего списка
            const imgUrl = images[i % images.length];
            
            item.innerHTML = `<img src="${imgUrl}">`;
            track.appendChild(item);
        }

        function spin() {
            btn.disabled = true;
            
            const itemFullWidth = 150; // 130px + 20px margin
            const trackCenter = 300; 
            const finalOffset = (winIndex * itemFullWidth) - trackCenter + (itemFullWidth / 2);
            
            // Рандомное смещение внутри предмета, чтобы не всегда в центр
            const randomShift = Math.floor(Math.random() * 80) - 40;
            
            track.style.transform = `translateX(-${finalOffset + randomShift}px)`;

            setTimeout(() => {
                alert("Кейс открыт!");
                // Сброс для теста
                track.style.transition = "none";
                track.style.transform = "translateX(0)";
                setTimeout(() => {
                    track.style.transition = "transform 5s cubic-bezier(0.15, 0, 0.15, 1)";
                    btn.disabled = false;
                }, 50);
            }, 5500);
        }
    </script>
</body>
</html>
