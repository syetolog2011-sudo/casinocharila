<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Mobile Game</title>
    <style>
        body {
            background-color: #000033; /* Твой синий фон */
            margin: 0; padding: 0;
            font-family: -apple-system, system-ui, sans-serif;
            color: white;
            height: 100vh; overflow: hidden;
        }

        /* Шапка */
        .header {
            padding: 15px 20px; display: flex; justify-content: center;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }
        .balance-badge {
            background: rgba(255, 255, 255, 0.1); padding: 8px 20px; border-radius: 20px;
            display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Экраны (Страницы) */
        .page {
            display: none; height: calc(100vh - 140px);
            overflow-y: auto; padding: 20px; box-sizing: border-box;
        }
        .page.active { display: block; }

        /* Карточки на главном экране */
        .card {
            width: 100%; height: 100px; border-radius: 25px; margin-bottom: 12px;
            display: flex; align-items: center; padding: 0 20px; box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1); transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .card:active { transform: scale(0.97); }
        .case-common { background: linear-gradient(90deg, #2c3e50 0%, #4ca1af 100%); }
        .case-rare { background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%); }
        .case-epic { background: linear-gradient(90deg, #4b6cb7 0%, #182848 100%); }
        .card-upgrade { background: linear-gradient(90deg, #d35400 0%, #e67e22 100%); }

        .card-icon { width: 60px; height: 60px; object-fit: contain; }
        .card-info { margin-left: 15px; }
        .card-title { font-size: 20px; font-weight: 800; display: block; }
        .card-desc { font-size: 13px; opacity: 0.8; }

        /* 🎰 Экран РУЛЕТКИ (Лента) */
        .roulette-container {
            text-align: center; margin-top: 50px;
        }
        .roulette-window {
            position: relative; width: 100%; height: 130px; 
            background: rgba(0,0,0,0.5); border-radius: 20px;
            overflow: hidden; display: flex; align-items: center;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .center-line {
            position: absolute; left: 50%; width: 2px; height: 100%;
            background: #fff; z-index: 10; box-shadow: 0 0 10px #fff;
        }
        .tape {
            display: flex; gap: 10px; padding: 0 10px;
            transition: transform 5s cubic-bezier(0.15, 0, 0.05, 1);
        }
        .tape-item {
            min-width: 100px; height: 100px; background: #1a1a3a;
            border-radius: 15px; flex-shrink: 0;
        }

        .btn-back {
            background: none; border: 1px solid #fff; color: #fff;
            padding: 8px 15px; border-radius: 10px; margin-bottom: 20px;
        }

        /* Нижнее меню */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(10, 10, 25, 0.98);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #888; }
        .nav-item.active { color: #fff; }
    </style>
</head>
<body>

    <header class="header">
        <div class="balance-badge"><span style="color: #ffca28;">⭐</span><span id="stars">1,500</span></div>
    </header>

    <div id="page-main" class="page active">
        <div class="card case-common" onclick="openRoulette('Обычный')">
            <img src="case1.png" class="card-icon" alt="📦">
            <div class="card-info">
                <span class="card-title">Обычный кейс</span>
                <span class="card-desc">100 ⭐</span>
            </div>
        </div>
        <div class="card case-rare" onclick="openRoulette('Редкий')">
            <img src="case2.png" class="card-icon" alt="🎁">
            <div class="card-info">
                <span class="card-title">Редкий кейс</span>
                <span class="card-desc">500 ⭐</span>
            </div>
        </div>
        <div class="card case-epic" onclick="openRoulette('Эпик')">
            <img src="case3.png" class="card-icon" alt="💎">
            <div class="card-info">
                <span class="card-title">Эпик кейс</span>
                <span class="card-desc">1,500 ⭐</span>
            </div>
        </div>
        <div class="card card-upgrade" onclick="showPage('page-upgrade')">
            <img src="upgrade_icon.png" class="card-icon" alt="⚡">
            <div class="card-info">
                <span class="card-title">Апгрейд</span>
                <span class="card-desc">Улучши свои подарки</span>
            </div>
        </div>
    </div>

    <div id="page-roulette" class="page">
        <button class="btn-back" onclick="showPage('page-main')">← Назад</button>
        <h2 id="case-name" style="text-align:center">Кейс</h2>
        
        <div class="roulette-container">
            <div class="roulette-window">
                <div class="center-line"></div>
                <div id="tape" class="tape">
                    </div>
            </div>
            
            <img src="btn_open.png" onclick="startSpin()" style="width: 200px; margin-top: 30px; cursor: pointer;">
        </div>
    </div>

    <div id="page-upgrade" class="page">
        <button class="btn-back" onclick="showPage('page-main')">← Назад</button>
        <h2 style="text-align:center">Улучшение</h2>
        </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showPage('page-main')"><span style="font-size: 20px;">📦</span><span>Кейсы</span></div>
        <div class="nav-item" onclick="showPage('page-upgrade')"><span style="font-size: 20px;">⚡</span><span>Апгрейд</span></div>
        <div class="nav-item"><span style="font-size: 20px;">👤</span><span>Профиль</span></div>
    </nav>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // Сбрасываем ленту при переключении
            if(pageId === 'page-roulette') {
                const tape = document.getElementById('tape');
                tape.style.transition = 'none';
                tape.style.transform = 'translateX(0)';
                fillTape();
            }
        }

        function openRoulette(name) {
            document.getElementById('case-name').innerText = name;
            showPage('page-roulette');
        }

        function fillTape() {
            const tape = document.getElementById('tape');
            tape.innerHTML = '';
            for(let i=0; i<50; i++) {
                const div = document.createElement('div');
                div.className = 'tape-item';
                // Временно просто цветные блоки, потом твои PNG
                div.style.background = `hsl(${Math.random() * 360}, 50%, 30%)`;
                tape.appendChild(div);
            }
        }

        function startSpin() {
            const tape = document.getElementById('tape');
            const winOffset = 2500; // На сколько пикселей крутить
            tape.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.05, 1)';
            tape.style.transform = `translateX(-${winOffset}px)`;
        }
    </script>
</body>
</html>
