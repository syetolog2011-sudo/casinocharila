<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade Slider</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Стили окна выбора (Modal) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 20px; border-radius: 15px; width: 80%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .modal-item { background: #252525; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .modal-item img { width: 100%; height: auto; }

        /* Контейнер апгрейда */
        .upgrade-section { width: 90%; max-width: 400px; margin-top: 50px; text-align: center; }
        .slots-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .item-box { width: 100px; height: 100px; background: #1a1a1a; border: 2px solid #333; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .item-box img { width: 80%; }

        /* Шкала (Hot Bar) */
        .slider-container { position: relative; width: 100%; height: 40px; background: #333; border-radius: 20px; overflow: hidden; margin: 20px 0; border: 2px solid #444; }
        .green-zone { height: 100%; background: linear-gradient(90deg, #00ff88, #55ffaa); transition: width 0.3s ease; width: 50%; }
        .arrow { position: absolute; top: 0; left: 0%; width: 4px; height: 100%; background: white; box-shadow: 0 0 10px #fff; z-index: 10; transition: left 2s cubic-bezier(0.1, 0, 0.1, 1); }

        .controls { margin-top: 20px; }
        input[type="range"] { width: 100%; margin-bottom: 10px; }
        .btn-upgrade { background: #00d2ff; color: #000; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="upgrade-section">
        <div class="slots-row">
            <div class="item-box" id="slot-from" onclick="openModal('from')">
                <span style="font-size: 10px; color: #666;">ВЫБРАТЬ</span>
            </div>
            <span style="font-size: 24px;">➡️</span>
            <div class="item-box" id="slot-to" onclick="openModal('to')">
                <span style="font-size: 10px; color: #666;">ВЫБРАТЬ</span>
            </div>
        </div>

        <div class="slider-container">
            <div class="green-zone" id="green-zone"></div>
            <div class="arrow" id="arrow"></div>
        </div>

        <div class="controls">
            <div id="chance-val">Шанс: 50%</div>
            <input type="range" min="1" max="95" value="50" oninput="updateChance(this.value)">
            <button class="btn-upgrade" onclick="startUpgrade()">UPGRADE</button>
        </div>
    </div>

    <div id="itemModal" class="modal">
        <div class="modal-content" id="modal-list"></div>
    </div>

    <script>
        const assets = [
            "https://storage.portal-market.com/portals-market/gifts/chillflame/models/png/losangeles.png",
            "https://storage.portal-market.com/portals-market/gifts/vicecream/models/png/pumpkinspice.png",
            "https://storage.portal-market.com/portals-market/gifts/xmasstocking/models/png/abandoned.png",
            "https://lztcdn.com/files/c51dbff1-7e57-4ce8-ad0c-efc56255fd3a.webp" // Твоя звезда
        ];

        let currentChance = 50;
        let activeSlot = '';

        function updateChance(val) {
            currentChance = val;
            document.getElementById('chance-val').innerText = `Шанс: ${val}%`;
            document.getElementById('green-zone').style.width = val + '%';
        }

        function openModal(slot) {
            activeSlot = slot;
            const list = document.getElementById('modal-list');
            list.innerHTML = '';
            assets.forEach(url => {
                const item = document.createElement('div');
                item.className = 'modal-item';
                item.innerHTML = `<img src="${url}">`;
                item.onclick = () => selectItem(url);
                list.appendChild(item);
            });
            document.getElementById('itemModal').style.display = 'flex';
        }

        function selectItem(url) {
            const slotId = activeSlot === 'from' ? 'slot-from' : 'slot-to';
            document.getElementById(slotId).innerHTML = `<img src="${url}">`;
            document.getElementById('itemModal').style.display = 'none';
        }

        function startUpgrade() {
            const arrow = document.getElementById('arrow');
            const btn = document.querySelector('.btn-upgrade');
            
            btn.disabled = true;
            arrow.style.transition = 'none';
            arrow.style.left = '0%';
            
            setTimeout(() => {
                const finalPos = Math.floor(Math.random() * 100);
                arrow.style.transition = 'left 2s cubic-bezier(0.15, 0, 0.15, 1)';
                arrow.style.left = finalPos + '%';

                setTimeout(() => {
                    if (finalPos <= currentChance) {
                        alert("УСПЕХ! Предмет улучшен! 🎉");
                    } else {
                        alert("НЕУДАЧА... Предмет сгорел 💀");
                    }
                    btn.disabled = false;
                }, 2100);
            }, 50);
        }
    </script>
</body>
</html>
