<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Mobile Game</title>
    <style>
        /* ПРИНУДИТЕЛЬНЫЙ СИНИЙ ФОН */
        html, body {
            background-color: #041737 !important; 
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }

        .menu-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .game-btn {
            width: 100%;
            cursor: pointer;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.1s;
            background: rgba(255, 255, 255, 0.05);
            min-height: 100px;
            -webkit-tap-highlight-color: transparent;
        }

        .game-btn:active { transform: scale(0.96); }

        .game-btn img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <div class="game-btn" onclick="alert('Рулетка!')">
            <img src="rulekta.png" alt="Рулетка">
        </div>

        <div class="game-btn" onclick="alert('Апгрейд!')">
            <img src="upgrade.jpg" alt="Апгрейд">
        </div>
    </div>

</body>
</html>
