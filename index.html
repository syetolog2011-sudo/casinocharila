<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Case Opener</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #1a1a1c;
            --accent: #47a1ff;
            --epic: #f1c40f;
            --rare: #3498db;
            --common: #95a5a6;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .balance { color: var(--accent); font-weight: bold; font-size: 18px; margin-top: 5px; }

        /* Контейнер рулетки */
        .roulette-box {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 160px;
            background: #0f0f11;
            border: 2px solid #222;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            align-items: center;
            box-shadow: inset 0 0 40px #000;
        }

        .roulette-box::before, .roulette-box::after {
            content: "";
            position: absolute;
            top: 0;
            width: 80px;
            height: 100%;
