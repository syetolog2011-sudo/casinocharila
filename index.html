<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Mobile Game</title>
    <style>
        body {
            background-color: #000033;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        .header { width: 100%; padding: 20px 0; display: flex; justify-content: center; }
        
        /* Если картинка не грузится, этот стиль покажет рамку, чтобы мы видели, где она должна быть */
        .balance-img { width: 110px; min-height: 40px; background: rgba(255,255,255,0.05); }

        .menu-container {
            flex: 1;
            display: flex; flex-direction: column;
            justify-content: center;
            gap: 20px; width: 85%; max-width: 380px;
        }

        .game-btn {
            width: 100%;
            cursor: pointer;
            transition: transform 0.1s;
            border-radius: 25px;
            overflow: hidden;
            background: rgba(255,255,255,0.05); /* Фон на случай, если картинка не прогрузится */
            min-height: 100px;
        }

        .game-btn:active { transform: scale(0.96); }

        .game-btn img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="image_3afed4.png" class="balance-img" alt="Баланс">
    </div>

    <div class="menu-container">
        
        <div class="game-btn">
            <img src="rulekta.png" alt="Рулетка" onerror="this.src='rulekta.PNG'">
        </div>

        <div class="game-btn">
            <img src="apgrade.png" alt="Апгрейд" onerror="this.src='apgrade.PNG'">
        </div>

    </div>

    <script>
        // Проверка в консоли (нажми F12 на сайте, чтобы увидеть ошибки)
        console.log("Проверка загрузки картинок...");
    </script>
</body>
</html>
