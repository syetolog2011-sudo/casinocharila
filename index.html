<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gift App Design</title>
    <style>
        :root { --tg-blue: #0088cc; --bg-dark: #0f0f0f; }
        body { background: var(--bg-dark); color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; }

        /* Верхний баланс */
        .header { padding: 15px; font-weight: bold; font-size: 20px; display: flex; align-items: center; gap: 5px; }
        .star-mini { width: 18px; height: 18px; }

        /* Рулетка */
        .roulette { position: relative; margin-top: 50px; height: 220px; background: rgba(255,255,255,0.02); border-y: 1px solid #222; overflow: hidden; }
        .pointer { position: absolute; left: 50%; width: 2px; height: 100%; background: var(--tg-blue); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 10px var(--tg-blue); }
        .track { display: flex; position: absolute; top: 30px; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        
        .item { min-width: 140px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .item img { width: 100px; height: 100px; object-fit: contain; }
        
        /* Плашка цены под предметом */
        .price-row { 
            background: rgba(255,255,255,0.08); 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 14px; 
            margin-top: 10px; 
            display: flex; 
            align-items: center; 
            gap: 4px;
            color: #ddd;
        }

        /* Главная кнопка */
        .btn-main { 
            position: fixed; bottom: 40px; left: 5%; width: 90%; 
            padding: 16px; background: var(--tg-blue); border: none; 
            border-radius: 50px; color: white; font-size: 18px; 
            font-weight: bold; cursor: pointer; 
        }

        /* ОКНО ВЫИГРЫША */
        #win-screen { 
            display: none; position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #1a2a3a 0%, #000 100%); 
            z-index: 100; flex-direction: column; align-items: center; justify-content: center; 
        }
        .win-img { width: 200px; height: 200px; transform: scale(0); animation: pop 0.5s 0.2s forwards cubic-bezier(0.17, 0.89, 0.32, 1.3); }
        @keyframes pop { to { transform: scale(1.1); } }

        .win-title { font-size: 28px; font-weight: 800; margin-top: 20px; }
        .win-desc { color: #aaa; margin-top: 5px; display: flex; align-items: center; gap: 5px; }
        
        .win-btns { width: 85%; margin-top: 50px; display: flex; flex-direction: column; gap: 10px; }
        .btn-oval { padding: 16px; border-radius: 50px; border: none; font-weight: bold; font-size: 16px; }
        .blue { background: var(--tg-blue); color: white; }
        .gray { background: rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://lztcdn.com/files/c51dbff1-7e57-4ce8-ad0c-efc56255fd3a.webp" class="star-mini">
        <span id="bal">25,000</span>
    </div>

    <div class="roulette">
        <div class="pointer"></div>
        <div class="track" id="track"></div>
    </div>

    <button class="btn-main" id="spin-btn" onclick="spin()">Открыть за 500 ⭐</button>

    <div id="win-screen">
        <img src="" id="w-img" class="win-img">
        <div class="win-title" id="w-name">Подарок!</div>
        <div class="win-desc">
            Коллекционный предмет • <span id="w-price">0</span> 
            <img src="https://lztcdn.com/files/c51dbff1-7e57-4ce8-ad0c-efc56255fd3a.webp" style="width:14px;">
        </div>
        
        <div class="win-btns">
            <button class="btn-oval blue">Поделиться</button>
            <button class="btn-oval gray" onclick="closeWin()">Продолжить</button>
        </div>
    </div>

    <script>
        const star = "https://lztcdn.com/files/c51dbff1-7e57-4ce8-ad0c-efc56255fd3a.webp";
        const gifts = [
            { n: 'Los Angeles', p: 270, u: 'https://storage.portal-market.com/portals-market/gifts/chillflame/models/png/losangeles.png' },
            { n: 'Pumpkin Spice', p: 274, u: 'https://storage.portal-market.com/portals-market/gifts/vicecream/models/png/pumpkinspice.png' },
            { n: 'Abandoned', p: 284, u: 'https://storage.portal-market.com/portals-market/gifts/xmasstocking/models/png/abandoned.png' },
            { n: 'Animator', p: 424, u: 'https://storage.portal-market.com/portals-market/gifts/timelessbook/models/png/animator.png' },
            { n: 'Antique', p: 837, u: 'https://storage.portal-market.com/portals-market/gifts/jinglebells/models/png/antique.png' }
        ];

        const track = document.getElementById('track');
        for(let i=0; i<70; i++) {
            const g = gifts[i % gifts.length];
            const d = document.createElement('div');
            d.className = 'item';
            d.innerHTML = `<img src="${g.u}"><div class="price-row">${g.p} <img src="${star}" class="star-mini"></div>`;
            track.appendChild(d);
        }

        function spin() {
            document.getElementById('spin-btn').disabled = true;
            const idx = 50 + Math.floor(Math.random() * 10);
            const winG = gifts[idx % gifts.length];
            const offset = (idx * 140) - (window.innerWidth / 2) + 70;

            track.style.transition = "transform 5s cubic-bezier(0.1, 0, 0.1, 1)";
            track.style.transform = `translateX(-${offset}px)`;

            setTimeout(() => {
                document.getElementById('w-img').src = winG.u;
                document.getElementById('w-name').innerText = winG.n;
                document.getElementById('w-price').innerText = winG.p;
                document.getElementById('win-screen').style.display = 'flex';
            }, 5500);
        }

        function closeWin() {
            document.getElementById('win-screen').style.display = 'none';
            document.getElementById('spin-btn').disabled = false;
            track.style.transition = "none";
            track.style.transform = "translateX(0)";
        }
    </script>
</body>
</html>
