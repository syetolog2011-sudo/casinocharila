<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Jackpot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 16px; overflow-x: hidden; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .balance { color: #47a1ff; font-size: 14px; margin-top: 5px; }

        /* Контейнер рулетки */
        .roulette-wrapper {
            position: relative;
            height: 120px;
            background: #161618;
            border-radius: 16px;
            border: 1px solid #28282a;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .center-line {
            position: absolute;
            left: 50%;
            width: 2px;
            height: 100%;
            background: #fff;
            z-index: 10;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .tape {
            display: flex;
            gap: 10px;
            padding: 0 10px;
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
            transform: translateX(0);
        }

        .item {
            min-width: 90px;
            height: 90px;
            background: #242426;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #333;
        }

        .item img { width: 50px; height: 50px; }

        /* Сетка содержимого кейса */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 30px;
        }

        .card {
            background: #161618;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            border: 1px solid #28282a;
        }

        .card img { width: 60px; height: 60px; margin-bottom: 8px; }
