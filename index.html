<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gift System Fix</title>
    <style>
        :root { --tg-blue: #0088cc; --bg: #0f1012; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; }

        /* Фикс гигантских звезд */
        .star-fix { width: 12px !important; height: 12px !important; display: inline-block; vertical-align: middle; }

        .header { padding: 12px; display: flex; align-items: center; gap: 5px; font-weight: bold; font-size: 17px; }
        .tab-content { display: none; height: calc(100vh - 110px); flex-direction: column; align-items: center; padding-top: 20px; }
        .tab-content.active { display: flex; }

        /* КЕЙСЫ */
        .r-wrap { position: relative; width: 100%; height: 130px; background: #161618; border-y: 1px solid #222; overflow: hidden; margin-top: 10px; }
        .r-track { display: flex; position: absolute; top: 10px; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .r-slot { min-width: 90px; text-align: center; margin: 0 5px; display: flex; flex-direction: column; align-items: center; }
        .r-slot img { width: 60px; height: 60px; object-fit: contain; }
        .r-pointer { position: absolute; left: 50%; height: 100%; width: 2px; background: var(--tg-blue); z-index: 10; transform: translateX(-50%); }

        /* ПРОФИЛЬ / ИНВЕНТАРЬ */
        .inventory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 90%; overflow-y: auto; }
        .inv-card { background: #1c1c1e; padding: 10px; border-radius: 12px; text-align: center; font-size: 11px; }
        .inv-card img { width: 50px; height: 50px; }

        /* АПГРЕЙД */
        .up-box { width: 85px; height: 85px; background: #1c1c1e; border: 1.5px dashed #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .up-box img { width: 60px; height: 60px; }
        .bar-box { position: relative; width: 85%; height: 30px; background: #262628; border-radius: 15px; overflow: hidden; margin: 15px 0; border: 1px solid #333; }
        .up-arrow { position: absolute; left: 0%; width: 3px; height: 100%; background: white; box-shadow: 0 0 8px white; }

        /* КНОПКИ */
        .btn-pill { width: 85%; padding: 14px; border-radius: 50px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; margin-bottom: 10px; }
        .blue { background: var(--tg-blue); color: white; }
        .gray { background: rgba(255,255,255,0.1); color: white; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #161618; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .n-btn { color: #888; font-size: 11px; text-align: center; }
        .n-btn.active { color: var(--tg-blue); }

        /* ОКНО ВЫИГРЫША */
        #win-modal { display: none; position: fixed; inset: 0; background: radial-gradient(circle, #1a2a3a 0%, #000 100%); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .w-img { width: 140px; height: 140px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://lztcdn.com/files/c51dbff1-7e57-4ce8-ad0c-efc56255fd3a.webp" class="star-fix">
        <span id="balance">25,000</span>
    </div>

    <div id="cases" class="tab-content active">
        <div class="r-wrap">
            <div class="r-pointer"></div>
            <div class="r-track" id="track"></div>
        </div>
        <button class="btn-pill blue" style="margin-top: 50px;" onclick="spin()">Открыть за 500 ⭐</button>
    </div>

    <div id="upgrade" class="tab-content">
        <div style="display:flex; gap:10px; align-items:center; margin-bottom:20px;">
            <div class="up-box" id="up-f" onclick="openSel('f')">ТВОЙ</div>
            <span>⚡</span>
            <div class="up-box" id="up-t" onclick="openSel('t')">ЦЕЛЬ</div>
        </div>
        <div id="u-chance" style="color:#00ff88; font-weight:bold;">Шанс: 0%</div>
        <div class="bar-box">
            <div id="g-zone" style="height:100%; background:#00ff88; width:0%"></div>
            <div class="up-arrow" id="u-arrow"></div>
        </div>
        <button class="btn-pill blue" id="up-start" disabled onclick="startUp()">UPGRADE</button>
    </div>

    <div id="profile" class="tab-content">
        <div class="inventory-grid" id="inv-list"></div>
    </div>

    <div id="win-modal">
        <img id="wi" class="w-img">
        <h2 id="wn"></h2>
        <p style="color:#888"><span id="wp"></span> <img src="https://lztcdn.com/files/c51dbff1-7e57-4ce8-ad0c-efc56255fd3a.webp" class="star-fix"></p>
        <button class="btn-pill blue" id="sell-btn">Продать</button>
        <button class="btn-pill gray" onclick="closeWin()">В инвентарь</button>
    </div>

    <div id="sel-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:200; align-items:center; justify-content:center;">
        <div id="sel-grid" class="inventory-grid" style="background:#1c1c1e; padding:20px; border-radius:15px;"></div>
    </div>

    <nav class="nav">
        <div class="n-btn active" onclick="tab('cases', this)">🎁<br>Кейсы</div>
        <div class="n-btn" onclick="tab('upgrade', this)">⚡<br>Апгрейд</div>
        <div class="n-btn" onclick="tab('profile', this)">👤<br>Профиль</div>
    </nav>

    <script>
        const star = "https://lztcdn.com/files/c51dbff1-7e57-4ce8-ad0c-efc56255fd3a.webp";
        const gifts = [
            {p:270, u:'https://storage.portal-market.com/portals-market/gifts/chillflame/models/png/losangeles.png'},
            {p:274, u:'https://storage.portal-market.com/portals-market/gifts/vicecream/models/png/pumpkinspice.png'},
            {p:284, u:'https://storage.portal-market.com/portals-market/gifts/xmasstocking/models/png/abandoned.png'},
            {p:424, u:'https://storage.portal-market.com/portals-market/gifts/timelessbook/models/png/animator.png'},
            {p:837, u:'https://storage.portal-market.com/portals-market/gifts/jinglebells/models/png/antique.png'}
        ].map(i => ({...i, n: i.u.split('/').pop().replace('.png','')}));

        let bal = 25000;
        let inv = [];
        let curWin = null;
        let sF = null, sT = null;

        // Рендер кейса
        const track = document.getElementById('track');
        for(let i=0; i<80; i++){
            const g = gifts[i % gifts.length];
            track.innerHTML += `<div class="r-slot"><img src="${g.u}"><div style="font-size:10px">${g.p} <img src="${star}" class="star-fix"></div></div>`;
        }

        function tab(id, el){
            document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.n-btn').forEach(n=>n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'profile') renderInv();
        }

        function spin(){
            if(bal < 500) return;
            bal -= 500; updateBal();
            const idx = 50 + Math.floor(Math.random() * 5);
            curWin = gifts[idx % gifts.length];
            const off = (idx * 100) - (window.innerWidth / 2) + 50;
            track.style.transition = "transform 5s cubic-bezier(0.1, 0, 0.1, 1)";
            track.style.transform = `translateX(-${off}px)`;
            setTimeout(() => showWin(curWin), 5500);
        }

        function showWin(g){
            document.getElementById('wi').src = g.u;
            document.getElementById('wn').innerText = g.n;
            document.getElementById('wp').innerText = g.p;
            document.getElementById('win-modal').style.display = 'flex';
            document.getElementById('sell-btn').onclick = () => {
                bal += g.p; updateBal(); closeWin();
            };
        }

        function closeWin(){
            inv.push(curWin);
            document.getElementById('win-modal').style.display = 'none';
            track.style.transition = "none"; track.style.transform = "translateX(0)";
        }

        function renderInv(){
            const list = document.getElementById('inv-list');
            list.innerHTML = inv.length ? '' : '<p style="grid-column:1/4">Пусто</p>';
            inv.forEach(i => {
                list.innerHTML += `<div class="inv-card"><img src="${i.u}"><br>${i.n}<br>${i.p} ⭐</div>`;
            });
        }

        function openSel(m){
            const list = m === 'f' ? inv : gifts;
            const grid = document.getElementById('sel-grid');
            grid.innerHTML = '';
            list.forEach((item, index) => {
                const d = document.createElement('div');
                d.className = 'inv-card';
                d.innerHTML = `<img src="${item.u}"><br>${item.p} ⭐`;
                d.onclick = () => {
                    if(m === 'f') sF = item; else sT = item;
                    document.getElementById(`up-${m}`).innerHTML = `<img src="${item.u}" style="width:100%">`;
                    document.getElementById('sel-modal').style.display = 'none';
                    if(sF && sT){
                        let c = (sF.p / sT.p) * 100; if(c > 95) c = 95;
                        document.getElementById('u-chance').innerText = `Шанс: ${c.toFixed(1)}%`;
                        document.getElementById('g-zone').style.width = c + '%';
                        document.getElementById('up-start').disabled = false;
                    }
                };
                grid.appendChild(d);
            });
            document.getElementById('sel-modal').style.display = 'flex';
        }

        function startUp(){
            const arr = document.getElementById('u-arrow');
            const start = performance.now();
            const final = Math.random() * 100;
            function anim(t){
                let p = (t - start) / 4000;
                if(p < 1){
                    arr.style.left = (p * 600) % 100 + '%';
                    requestAnimationFrame(anim);
                } else {
                    arr.style.left = final + '%';
                    setTimeout(() => {
                        let c = (sF.p / sT.p) * 100;
                        if(final <= c){ alert("УСПЕХ! 🎉"); inv.push(sT); } else { alert("СГОРЕЛ... 💀"); }
                        inv = inv.filter(i => i !== sF);
                        location.reload();
                    }, 500);
                }
            }
            requestAnimationFrame(anim);
        }

        function updateBal(){ document.getElementById('balance').innerText = bal.toLocaleString(); }
    </script>
</body>
</html>
