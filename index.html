<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gift Casino PRO</title>
    <style>
        :root { --tg-blue: #0088cc; --bg: #0f1012; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; user-select: none; }

        /* Фикс звезды */
        .s-icon { width: 12px !important; height: 12px !important; vertical-align: middle; }
        .s-big { width: 18px !important; height: 18px !important; }

        .header { padding: 15px; display: flex; align-items: center; gap: 6px; font-weight: bold; font-size: 18px; }
        
        .tab-content { display: none; height: calc(100vh - 120px); flex-direction: column; align-items: center; padding-top: 20px; overflow-y: auto; }
        .tab-content.active { display: flex; }

        /* КЕЙСЫ */
        .r-wrap { position: relative; width: 100%; height: 130px; background: #161618; border-top: 1px solid #222; border-bottom: 1px solid #222; overflow: hidden; margin-top: 10px; }
        .r-track { display: flex; position: absolute; top: 15px; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .r-slot { min-width: 100px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .r-slot img { width: 65px; height: 65px; object-fit: contain; }
        .p-badge { background: rgba(255,255,255,0.06); padding: 3px 10px; border-radius: 12px; font-size: 11px; margin-top: 8px; color: #aaa; }
        .r-pointer { position: absolute; left: 50%; height: 100%; width: 2px; background: var(--tg-blue); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 10px var(--tg-blue); }

        /* АПГРЕЙД */
        .up-box { width: 100px; height: 100px; background: #1c1c1e; border: 1.5px dashed #333; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .up-box img { width: 70px; height: 70px; object-fit: contain; }
        
        .bar-container { position: relative; width: 85%; height: 34px; background: #262628; border-radius: 17px; overflow: hidden; border: 1px solid #444; margin: 15px 0; }
        /* ПАЛКА (СТРЕЛКА) - теперь её видно! */
        .up-arrow { position: absolute; top: 0; left: 0%; width: 4px; height: 100%; background: #fff; box-shadow: 0 0 15px #fff; z-index: 50; }

        /* ПРОФИЛЬ */
        .inv-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 92%; padding-bottom: 30px; }
        .inv-card { background: #1c1c1e; padding: 12px; border-radius: 16px; text-align: center; border: 1px solid #222; }
        .inv-card img { width: 70px; height: 70px; object-fit: contain; }
        .btn-sell-small { background: rgba(255,50,50,0.15); color: #ff5555; border: none; padding: 6px; border-radius: 10px; font-size: 12px; margin-top: 8px; width: 100%; cursor: pointer; }

        /* КНОПКИ */
        .btn-pill { width: 85%; padding: 15px; border-radius: 50px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        .blue { background: var(--tg-blue); color: white; }
        .gray { background: rgba(255,255,255,0.08); color: white; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #161618; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .n-btn { color: #888; font-size: 12px; text-align: center; cursor: pointer; }
        .n-btn.active { color: var(--tg-blue); }

        /* ОКНО ВЫИГРЫША */
        #win-modal { display: none; position: fixed; inset: 0; background: radial-gradient(circle at center, #1a2a3a 0%, #000 100%); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .win-anim { width: 160px; height: 160px; transform: scale(0); animation: pop 0.6s forwards cubic-bezier(0.17, 0.89, 0.32, 1.3); }
        @keyframes pop { to { transform: scale(1.1); } }

        /* МОДАЛКА ВЫБОРА */
        #sel-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; align-items: center; justify-content: center; }
        .sel-content { background: #1c1c1e; width: 85%; max-height: 70%; border-radius: 20px; padding: 20px; overflow-y: auto; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://lztcdn.com/files/c51dbff1-7e57-4ce8-ad0c-efc56255fd3a.webp" class="s-icon s-big">
        <span id="bal">25,000</span>
    </div>

    <div id="cases" class="tab-content active">
        <div class="r-wrap">
            <div class="r-pointer"></div>
            <div class="r-track" id="track"></div>
        </div>
        <button class="btn-pill blue" style="margin-top: 60px;" onclick="spin()">Открыть за 500 ⭐</button>
    </div>

    <div id="upgrade" class="tab-content">
        <div style="display:flex; gap:15px; align-items:center; margin-bottom:20px;">
            <div class="up-box" id="up-f" onclick="openSelect('f')"><span style="font-size:10px;color:#555">ТВОЙ</span></div>
            <span style="font-size:24px">⚡</span>
            <div class="up-box" id="up-t" onclick="openSelect('t')"><span style="font-size:10px;color:#555">ЦЕЛЬ</span></div>
        </div>
        <div id="u-chance" style="color:#00ff88; font-weight:bold; font-size:20px;">0%</div>
        <div class="bar-container">
            <div id="g-zone" style="height:100%; background:#00ff88; width:0%; transition: 0.3s;"></div>
            <div class="up-arrow" id="u-arrow"></div>
        </div>
        <button class="btn-pill blue" id="up-btn" disabled onclick="startUp()">UPGRADE</button>
    </div>

    <div id="profile" class="tab-content">
        <div class="inv-grid" id="inv-list"></div>
    </div>

    <div id="win-modal">
        <img id="wi" class="win-anim">
        <h2 id="wn" style="margin-top:20px; text-transform: capitalize;"></h2>
        <p style="color:#888; display:flex; align-items:center; gap:5px;">
            Worth <span id="wp"></span> <img src="https://lztcdn.com/files/c51dbff1-7e57-4ce8-ad0c-efc56255fd3a.webp" class="s-icon">
        </p>
        <div style="width:85%; margin-top:30px;">
            <button class="btn-pill blue" onclick="closeWin()">Далее</button>
            <button class="btn-pill gray" id="sell-fast">Продать сейчас</button>
        </div>
    </div>

    <div id="sel-modal" onclick="this.style.display='none'">
        <div class="sel-content" id="sel-grid" onclick="event.stopPropagation()"></div>
    </div>

    <nav class="nav">
        <div class="n-btn active" onclick="tab('cases', this)">🎁<br>Кейсы</div>
        <div class="n-btn" onclick="tab('upgrade', this)">⚡<br>Апгрейд</div>
        <div class="n-btn" onclick="tab('profile', this)">👤<br>Профиль</div>
    </nav>

    <script>
        const star = "https://lztcdn.com/files/c51dbff1-7e57-4ce8-ad0c-efc56255fd3a.webp";
        const gifts = [
            {p:270, u:'https://storage.portal-market.com/portals-market/gifts/chillflame/models/png/losangeles.png'},
            {p:274, u:'https://storage.portal-market.com/portals-market/gifts/vicecream/models/png/pumpkinspice.png'},
            {p:284, u:'https://storage.portal-market.com/portals-market/gifts/xmasstocking/models/png/abandoned.png'},
            {p:424, u:'https://storage.portal-market.com/portals-market/gifts/timelessbook/models/png/animator.png'},
            {p:837, u:'https://storage.portal-market.com/portals-market/gifts/jinglebells/models/png/antique.png'}
        ].map(i => ({...i, n: i.u.split('/').pop().replace('.png','')}));

        let bal = 25000;
        let inv = [];
        let lastWon = null;
        let sF = null, sT = null;

        // Кейс лента
        const track = document.getElementById('track');
        for(let i=0; i<80; i++){
            const g = gifts[i % gifts.length];
            track.innerHTML += `<div class="r-slot"><img src="${g.u}"><div class="p-badge">${g.p} <img src="${star}" class="s-icon"></div></div>`;
        }

        function tab(id, el){
            document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.n-btn').forEach(n=>n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'profile') renderProfile();
        }

        function spin(){
            if(bal < 500) return;
            bal -= 500; updateBal();
            const idx = 55 + Math.floor(Math.random() * 5);
            lastWon = gifts[idx % gifts.length];
            const off = (idx * 110) - (window.innerWidth / 2) + 55;
            track.style.transition = "transform 5s cubic-bezier(0.1, 0, 0.1, 1)";
            track.style.transform = `translateX(-${off}px)`;
            setTimeout(() => {
                document.getElementById('wi').src = lastWon.u;
                document.getElementById('wn').innerText = lastWon.n;
                document.getElementById('wp').innerText = lastWon.p;
                document.getElementById('win-modal').style.display = 'flex';
                document.getElementById('sell-fast').onclick = () => { bal += lastWon.p; updateBal(); lastWon = null; closeWin(); };
            }, 5500);
        }

        function closeWin(){
            if(lastWon) inv.push(lastWon);
            document.getElementById('win-modal').style.display = 'none';
            track.style.transition = "none"; track.style.transform = "translateX(0)";
            lastWon = null;
        }

        function renderProfile(){
            const list = document.getElementById('inv-list');
            list.innerHTML = inv.length ? '' : '<p style="grid-column:1/3;text-align:center;color:#555">Тут пока пусто</p>';
            inv.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'inv-card';
                card.innerHTML = `
                    <img src="${item.u}"><br>
                    <span style="font-size:12px;font-weight:bold">${item.n}</span><br>
                    <span style="font-size:11px;color:#00ff88">${item.p} <img src="${star}" class="s-icon"></span>
                    <button class="btn-sell-small" onclick="sellItem(${index})">Продать</button>
                `;
                list.appendChild(card);
            });
        }

        function sellItem(idx){
            bal += inv[idx].p;
            inv.splice(idx, 1);
            updateBal();
            renderProfile();
        }

        function openSelect(m){
            const grid = document.getElementById('sel-grid');
            grid.innerHTML = '';
            const list = m === 'f' ? inv : gifts;
            list.forEach((item, index) => {
                const d = document.createElement('div');
                d.className = 'inv-card';
                d.innerHTML = `<img src="${item.u}"><br><span style="font-size:10px">${item.p} ⭐</span>`;
                d.onclick = () => {
                    if(m === 'f') sF = item; else sT = item;
                    document.getElementById(`up-${m}`).innerHTML = `<img src="${item.u}">`;
                    document.getElementById('sel-modal').style.display = 'none';
                    if(sF && sT){
                        let c = (sF.p / sT.p) * 100; if(c > 95) c = 95;
                        document.getElementById('u-chance').innerText = c.toFixed(1) + '%';
                        document.getElementById('g-zone').style.width = c + '%';
                        document.getElementById('up-btn').disabled = false;
                    }
                };
                grid.appendChild(d);
            });
            document.getElementById('sel-modal').style.display = 'flex';
        }

        function startUp(){
            const arr = document.getElementById('u-arrow');
            const btn = document.getElementById('up-btn');
            btn.disabled = true;
            const start = performance.now();
            const final = Math.random() * 100;

            function frame(t){
                let p = (t - start) / 4000;
                if(p < 1){
                    arr.style.left = (p * 500) % 100 + '%';
                    requestAnimationFrame(frame);
                } else {
                    arr.style.left = final + '%';
                    setTimeout(() => {
                        let c = (sF.p / sT.p) * 100;
                        if(final <= c){
                            alert("УСПЕХ! " + sT.n + " теперь твой! 🎉");
                            inv.push(sT); // Добавляем в инвентарь!
                        } else {
                            alert("СГОРЕЛ... 💀");
                        }
                        inv = inv.filter(i => i !== sF); // Удаляем старый
                        // Сброс слотов
                        sF = null; sT = null;
                        document.getElementById('up-f').innerHTML = '<span style="font-size:10px;color:#555">ТВОЙ</span>';
                        document.getElementById('up-t').innerHTML = '<span style="font-size:10px;color:#555">ЦЕЛЬ</span>';
                        document.getElementById('g-zone').style.width = '0%';
                        document.getElementById('u-chance').innerText = '0%';
                    }, 500);
                }
            }
            requestAnimationFrame(frame);
        }

        function updateBal(){ document.getElementById('bal').innerText = bal.toLocaleString(); }
    </script>
</body>
</html>
