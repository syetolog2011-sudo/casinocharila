<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Case Opener</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #1a1a1c;
            --accent: #47a1ff;
            --epic: #f1c40f;
            --rare: #3498db;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 25px; }
        .balance { color: var(--accent); font-weight: bold; font-size: 20px; }

        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 160px;
            background: #0f0f11;
            border: 2px solid #222;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            align-items: center;
            box-shadow: inset 0 0 40px #000;
        }

        .center-line {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 100%;
            background: #fff;
            z-index: 10;
            box-shadow: 0 0 15px #fff;
        }

        .tape {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 10px;
            transition: transform 5s cubic-bezier(0.15, 0, 0.05, 1);
        }

        .nft-card {
            min-width: 125px;
            height: 125px;
            background: var(--card-bg);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 5px solid #333;
            flex-shrink: 0;
            /* Обрезает картинку по закругленным краям карточки */
            overflow: hidden; 
            position: relative;
        }

        /* Настройки картинки: на всё окошко */
        .nft-card img { 
            width: 100%; 
            height: 100%; 
            /* Сохраняет пропорции и заполняет весь квадрат */
            object-fit: cover; 
        }

        .nft-card.epic { border-color: var(--epic); box-shadow: inset 0 0 20px rgba(241, 196, 15, 0.3); }
        .nft-card.rare { border-color: var(--rare); box-shadow: inset 0 0 20px rgba(52, 152, 219, 0.3); }

        .btn {
            width: 100%;
            max-width: 400px;
            padding: 22px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 22px;
            font-weight: 900;
            font-size: 18px;
            margin-top: 40px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; letter-spacing: 2px;">КЕЙС «FROZEN» ❄️</h2>
        <div class="balance">БАЛАНС: <span id="coins">100</span> 💎</div>
    </div>

    <div class="roulette-wrapper">
        <div class="center-line"></div>
        <div class="tape" id="tape"></div>
    </div>

    <button class="btn" id="spinBtn" onclick="startSpin()">ОТКРЫТЬ КЕЙС</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const tape = document.getElementById('tape');
        
        // Список предметов с твоим фото
        const items = [
            { 
                img: 'https://raw.githubusercontent.com/syetolog2011-sudo/casinocharila/main/photo_5296748618452769416_m.jpg', 
                rarity: 'epic' 
            },
            { 
                img: 'https://raw.githubusercontent.com/syetolog2011-sudo/casinocharila/main/photo_5296748618452769469_m (1).jpg', 
                rarity: 'rare' 
            },
            { 
                img: 'https://raw.githubusercontent.com/syetolog2011-sudo/casinocharila/main/photo_5296748618452769466_m.jpg', 
                rarity: 'common' 
            }
        ];

        function buildTape() {
            tape.innerHTML = '';
            // Генерируем ленту
            for (let i = 0; i < 80; i++) {
                const item = items[Math.floor(Math.random() * items.length)];
                const card = document.createElement('div');
                card.className = `nft-card ${item.rarity}`;
                card.innerHTML = `<img src="${item.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/9420/9420917.png'">`;
                tape.appendChild(card);
            }
        }

        function startSpin() {
            const btn = document.getElementById('spinBtn');
            const balanceEl = document.getElementById('coins');
            let balance = parseInt(balanceEl.innerText);

            if (balance < 10) {
                alert("Мало камней! 💎");
                return;
            }
            
            balanceEl.innerText = balance - 10;
            btn.disabled = true;

            const cardWidth = 137; 
            const winIndex = 60; // На какой карточке остановимся
            const randomOffset = Math.floor(Math.random() * 100) - 50; // Рандом для честности
            const offset = (winIndex * cardWidth) - (tape.parentElement.offsetWidth / 2) + (cardWidth / 2) + randomOffset;

            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0)';
            
            setTimeout(() => {
                tape.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.05, 1)';
                tape.style.transform = `translateX(-${offset}px)`;
            }, 50);

            setTimeout(() => {
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                alert("Выпал предмет!");
                btn.disabled = false;
                // Пересобираем ленту для нового прокрута
                setTimeout(buildTape, 500);
            }, 5500);
        }

        buildTape();
    </script>
</body>
</html>
