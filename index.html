<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Mobile Game</title>
    <style>
        html, body {
            background-color: #02132f !important; 
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            -webkit-user-select: none; /* Запрет выделения текста */
        }

        /* ПАНЕЛЬ БАЛАНСА */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 25px 0 15px 0;
        }

        .balance-item {
            background: #1c253d;
            border-radius: 25px;
            padding: 4px 10px 4px 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 38px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* ТВОЯ ПИКСЕЛЬНАЯ ЗВЕЗДА (ВМЕСТО КОДА) */
        .star-icon-img {
            width: 32px; /* Чуть увеличил, чтобы пиксели были видны */
            height: 32px;
            object-fit: contain;
            image-rendering: pixelated; /* Сохраняет четкость пикселей на экране */
        }

        .balance-text { 
            color: white; 
            font-weight: 800; 
            font-size: 18px; 
            margin: 0 5px;
        }

        /* МОЙ ПЛЮСИК */
        .plus-btn {
            background: #3b82f6;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
            border: none;
        }
        .plus-btn:active { transform: scale(0.85); }

        /* ТВОИ КНОПКИ */
        .menu-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .game-btn {
            width: 100%;
            cursor: pointer;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .game-btn:active { transform: scale(0.96); }
        .game-btn img { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="balance-item">
            <img src="star.png" alt="star" class="star-icon-img">
            
            <span class="balance-text">125</span>
            
            <button class="plus-btn" onclick="alert('Магазин звезд')">
                <svg width="14" height="14" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 2V10M2 6H10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="menu-container">
        <div class="game-btn" onclick="alert('Рулетка!')">
            <img src="rulekta.png" alt="Рулетка">
        </div>

        <div class="game-btn" onclick="alert('Апгрейд!')">
            <img src="upg.png" alt="Апгрейд">
        </div>
    </div>

</body>
</html>
