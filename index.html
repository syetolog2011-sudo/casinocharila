<style>
    /* Эффект свечения для карточек */
    .card {
        background: #161618;
        border-radius: 16px;
        padding: 16px;
        text-align: center;
        border: 1px solid #28282a;
        transition: transform 0.2s;
        position: relative;
        overflow: hidden;
    }

    .card:hover { transform: translateY(-5px); border-color: #47a1ff; }

    /* Метки редкости */
    .rarity {
        position: absolute;
        top: 8px;
        right: 8px;
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 4px;
        text-transform: uppercase;
        font-weight: bold;
    }
    .epic { background: #f1c40f; color: #000; box-shadow: 0 0 10px #f1c40f; }
    .rare { background: #3498db; color: #fff; }
    .common { background: #95a5a6; color: #fff; }

    .card img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 10px; }
</style>

<div class="grid">
    <div class="card">
        <span class="rarity epic">Epic</span>
        <img src="https://cdn-icons-png.flaticon.com/512/9420/9420917.png">
        <div class="price-tag">Jackpot Frog 🐸</div>
    </div>
    <div class="card">
        <span class="rarity rare">Rare</span>
        <img src="https://cdn-icons-png.flaticon.com/512/2912/2912761.png">
        <div class="price-tag">Ice Diamond 💎</div>
    </div>
    <div class="card">
        <span class="rarity common">Common</span>
        <img src="https://cdn-icons-png.flaticon.com/512/5219/5219258.png">
        <div class="price-tag">Frozen Box 📦</div>
    </div>
</div>

<script>
    // Массив с красивыми NFT объектами
    const nftItems = [
        { name: 'Frog', img: 'https://cdn-icons-png.flaticon.com/512/9420/9420917.png', rarity: 'epic' },
        { name: 'Diamond', img: 'https://cdn-icons-png.flaticon.com/512/2912/2912761.png', rarity: 'rare' },
        { name: 'Box', img: 'https://cdn-icons-png.flaticon.com/512/5219/5219258.png', rarity: 'common' },
        { name: 'Star', img: 'https://cdn-icons-png.flaticon.com/512/1828/1828884.png', rarity: 'common' }
    ];

    const list = document.getElementById('list');
    
    // Генерируем ленту из красивых NFT
    for (let i = 0; i < 60; i++) {
        const item = nftItems[i % nftItems.length];
        list.innerHTML += `
            <div class="card" style="min-width: 100px; height: 100px; margin: 0 5px;">
                <img src="${item.img}" style="width: 70px;">
            </div>`;
    }

    function spin() {
        // Логика списания баланса (визуально)
        let balance = document.getElementById('val');
        if (parseInt(balance.innerText) < 10) return alert("Недостаточно 💎");
        
        balance.innerText = parseInt(balance.innerText) - 10;

        const move = Math.floor(Math.random() * 1500) + 3000;
        list.style.transform = `translateX(-${move}px)`;
        
        // Показываем результат
        setTimeout(() => {
            tg.HapticFeedback.notificationOccurred('success'); // Вибрация в TG
            alert("Вы получили новый NFT подарок! Проверьте инвентарь.");
        }, 4500);
    }
</script>
