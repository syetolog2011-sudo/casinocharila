<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Mobile Game</title>
    <style>
        html, body {
            background-color: #02132f !important; 
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            font-family: sans-serif; -webkit-user-select: none; color: white;
            overflow: hidden;
        }

        /* ПАНЕЛЬ БАЛАНСА */
        .top-bar { width: 100%; display: flex; justify-content: center; padding: 20px 0; z-index: 100; position: relative; }
        .balance-item {
            background: #1c253d; border-radius: 25px; padding: 4px 10px 4px 8px;
            display: flex; align-items: center; gap: 6px; height: 38px; border: 1px solid rgba(255,255,255,0.1);
        }
        .balance-text { font-weight: 800; font-size: 18px; margin: 0 4px; }

        /* ЭКРАНЫ */
        .screen { width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; position: absolute; top: 0; left: 0; padding-top: 80px; box-sizing: border-box; }
        .active { display: flex; }

        /* ГЛАВНОЕ МЕНЮ И ВЫБОР КЕЙСОВ */
        .container { width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .game-btn { width: 100%; cursor: pointer; border-radius: 20px; overflow: hidden; background: #1c253d; }
        .game-btn img { width: 100%; height: auto; display: block; }

        .cases-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 400px; }
        .case-card-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .case-card { background: #2a2f3d; border-radius: 20px; aspect-ratio: 1/1; overflow: hidden; cursor: pointer; width: 100%; }
        .case-card img { width: 100%; height: 100%; object-fit: cover; }
        .case-label { font-weight: bold; font-size: 14px; color: #aaa; }

        /* ИНТЕРФЕЙС КРУТИЛКИ */
        .roulette-bg {
            background: radial-gradient(circle, #1a56db 0%, #02132f 100%);
            width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center;
        }
        
        .nav-header { width: 90%; display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .close-btn { font-size: 24px; cursor: pointer; }

        .drop-line {
            display: flex; gap: 10px; overflow-x: auto; padding: 20px; width: 100%;
            justify-content: flex-start; scroll-behavior: smooth;
        }
        .drop-line::-webkit-scrollbar { display: none; }

        .drop-item {
            min-width: 80px; height: 80px; background: rgba(255,255,255,0.1);
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0;
            font-size: 10px; color: rgba(255,255,255,0.5);
        }

        .pointer { width: 20px; height: 20px; background: white; clip-path: polygon(50% 100%, 0 0, 100% 0); margin-bottom: 5px; }
        .pointer-bottom { width: 20px; height: 20px; background: white; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); margin-top: 5px; }

        .spin-btn {
            background: #3b82f6; width: 80%; max-width: 300px; padding: 15px;
            border-radius: 15px; border: none; color: white; font-weight: bold;
            font-size: 18px; cursor: pointer; margin-top: auto; margin-bottom: 50px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="balance-item">
            <span class="balance-text">⭐ 125</span>
        </div>
    </div>

    <div id="screen-main" class="screen active">
        <div class="container">
            <div class="game-btn" onclick="openScreen('screen-cases')"><img src="ruletka.jpg"></div>
            <div class="game-btn" onclick="alert('Скоро будет')"><img src="upgrade.jpg"></div>
        </div>
    </div>

    <div id="screen-cases" class="screen">
        <div class="nav-header"><span class="close-btn" onclick="openScreen('screen-main')">✕</span><h2>Кейсы</h2><div></div></div>
        <div class="cases-grid">
            <div class="case-card-wrapper">
                <div class="case-card" onclick="initSpin(7, 'Homeless')"><img src="case1.webp"></div>
                <span class="case-label">Homeless</span>
            </div>
            <div class="case-card-wrapper">
                <div class="case-card" onclick="initSpin(10, 'Rybkins')"><img src="case2.webp"></div>
                <span class="case-label">Rybkins</span>
            </div>
            <div class="case-card-wrapper">
                <div class="case-card" onclick="initSpin(7, 'Crazy')"><img src="case3.webp"></div>
                <span class="case-label">Crazy</span>
            </div>
        </div>
    </div>

    <div id="screen-spin" class="screen" style="padding-top: 0;">
        <div class="roulette-bg">
            <div class="nav-header" style="margin-top: 80px;">
                <span class="close-btn" onclick="openScreen('screen-cases')">✕ Назад</span>
                <h3 id="case-title">Кейс</h3>
                <div></div>
            </div>

            <div style="margin-top: 50px; display: flex; flex-direction: column; align-items: center; width: 100%;">
                <div class="pointer"></div>
                <div class="drop-line" id="drop-container"></div>
                <div class="pointer-bottom"></div>
            </div>

            <button class="spin-btn" id="spin-main-button">Крутить за ⭐ 199</button>
        </div>
    </div>

    <script>
        function openScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function initSpin(count, title) {
            document.getElementById('case-title').innerText = title;
            const container = document.getElementById('drop-container');
            container.innerHTML = ''; 

            for (let i = 1; i <= count; i++) {
                const item = document.createElement('div');
                item.className = 'drop-item';
                item.innerText = 'Item ' + i;
                container.appendChild(item);
            }

            // Настройка цены в зависимости от названия (если нужно)
            const btn = document.getElementById('spin-main-button');
            if(title === 'Rybkins') btn.innerText = 'Крутить за ⭐ 299';
            else btn.innerText = 'Крутить за ⭐ 199';

            openScreen('screen-spin');
        }
    </script>
</body>
</html>
