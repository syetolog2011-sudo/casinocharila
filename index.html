<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honey App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            background: #000 url('bg.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: sans-serif;
            text-align: center;
        }
        .container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 100px;
        }
        .card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .card img {
            width: 100%;
            max-width: 300px;
            border-radius: 15px;
        }
        .menu-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: orange;
            border-radius: 50%;
            font-size: 30px;
            border: none;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Honey Project</h1>

        <div class="card">
            <img src="cases.png" alt="Кейсы">
            <h2>Кейсы</h2>
        </div>

        <div class="card">
            <img src="bank.png" alt="Банк">
            <h2>Банки</h2>
        </div>

        <div class="card">
            <img src="game.png" alt="Игра">
            <h2>Игра</h2>
        </div>
    </div>

    <button class="menu-btn" onclick="openMenu()">☰</button>

    <script>
        // Инициализация
        const tg = window.Telegram.WebApp;
        tg.expand();

        function openMenu() {
            tg.showAlert("Меню скоро заработает!");
        }
    </script>
</body>
</html>
