<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Game - Stage 1</title>
    <style>
        /* Устанавливаем твой фон */
        body {
            background-color: #000033; /* Тот самый глубокий синий */
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: -apple-system, system-ui, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Контейнер для будущего контента */
        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status {
            margin-top: 50%;
            text-align: center;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="status">
            <p>Фон установлен успешно.</p>
            <p>Жду следующих инструкций...</p>
        </div>
    </div>

</body>
</html>
