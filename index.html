<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Mobile Game</title>
    <style>
        body {
            background-color: #000033; /* Твой синий фон */
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            align-items: center;
            height: 100vh; overflow: hidden;
            font-family: sans-serif;
        }

        /* БАЛАНС СВЕРХУ */
        .header {
            width: 100%; padding: 20px 0;
            display: flex; justify-content: center;
        }
        .balance-img {
            width: 120px; /* Размер твоей иконки со звездой */
            height: auto;
        }

        /* КОНТЕЙНЕР ДЛЯ КНОПОК */
        .menu-container {
            flex: 1;
            display: flex; flex-direction: column;
            justify-content: center;
            gap: 20px; width: 90%; max-width: 400px;
        }

        /* КНОПКИ-КАРТИНКИ */
        .game-btn {
            width: 100%;
            cursor: pointer;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .game-btn:active { transform: scale(0.95); }
        .game-btn img { width: 100%; height: auto; display: block; border-radius: 20px; }

    </style>
</head>
<body>

    <div class="header">
        <img src="image_3afed4.png" class="balance-img" alt="Balance">
    </div>

    <div class="menu-container">
        
        <div class="game-btn" onclick="location.href='roulette.html'">
            <img src="ChatGPT Image 12 mar. 2026 г., 12_09_23.png" alt="Рулетка">
        </div>

        <div class="game-btn" onclick="location.href='upgrade.html'">
            <img src="ChatGPT Image 12 mar. 2026 г., 12_16_18.png" alt="Апгрейд">
        </div>

    </div>

</body>
</html>
