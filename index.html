<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Star Lite</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            color: white; overflow: hidden; display: flex; flex-direction: column;
        }

        .game-section {
            flex: 1; position: relative; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .multiplier-container { text-align: center; z-index: 5; }
        .multiplier { font-size: 80px; font-weight: 900; }
        .status-text { color: #ff4d4d; font-size: 24px; font-weight: bold; margin-top: 10px; display: none; }

        .rocket-box { width: 180px; height: 180px; z-index: 4; display: none; }
        .rocket-box video { width: 100%; height: 100%; object-fit: contain; }

        /* ЦЕНТРАЛЬНАЯ ПОЛОСА ОЖИДАНИЯ */
        .wait-container { width: 70%; text-align: center; z-index: 6; }
        .progress-bar { width: 100%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { width: 0%; height: 100%; background: #a347ff; }

        /* ПАНЕЛЬ УПРАВЛЕНИЯ */
        .controls-section {
            background: #111; border-top: 1px solid #222;
            padding: 25px 20px 40px; z-index: 10;
        }

        .main-btn {
            width: 100%; padding: 20px; border-radius: 16px; border: none;
            font-size: 20px; font-weight: bold; color: white;
            background: #6a11cb; margin-bottom: 20px; cursor: pointer;
        }
        .btn-green { background: #4cd137 !important; color: #000; }
        .btn-gray { background: #333 !important; cursor: not-allowed; }

        .settings-grid { display: flex; flex-direction: column; gap: 12px; }
        .input-box {
            background: #1a1a1a; border-radius: 12px; padding: 12px 15px;
            display: flex; align-items: center; gap: 10px;
        }
        .input-box input { background: transparent; border: none; color: white; font-size: 18px; width: 80px; outline: none; }
        
        .balance-display { text-align: center; margin-bottom: 15px; font-size: 18px; color: #ffcc00; font-weight: bold; }

        .checkbox-container { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #888; }
        .disabled-ui { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>

    <div class="game-section">
        <div class="multiplier-container">
            <div class="multiplier" id="mult">1.00x</div>
            <div class="status-text" id="status">Улетела</div>
        </div>

        <div class="wait-container" id="wait-box">
            <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
            <div style="font-size: 14px; color: #888;">Ожидание...</div>
        </div>

        <div class="rocket-box" id="rocket">
            <video id="vid" loop muted playsinline><source src="13879313762885.mp4" type="video/mp4"></video>
        </div>
    </div>

    <div class="controls-section">
        <div class="balance-display" id="balance">100 ⭐</div>
        
        <button class="main-btn" id="main-btn">СТАВКА</button>
        
        <div class="settings-grid" id="ui-block">
            <div class="input-box">
                <div class="checkbox-container">
                    <input type="checkbox" id="auto-enabled" style="width: 20px; height: 20px;">
                    <span>Авто-вывод:</span>
                </div>
                <input type="number" id="auto-val" value="2.0" step="0.1">
                <span style="color:#a347ff">x</span>
            </div>
            
            <div class="input-box">
                <span style="color:#888">Ставка:</span>
                <input type="number" id="bet-sum" value="10">
                <span style="color:#ffcc00">⭐</span>
            </div>
        </div>
    </div>

<script>
    let stars = 100;
    let isFlying = false;
    let betPlaced = false;
    let currentX = 1.00;
    let gameLoop;

    const els = {
        btn: document.getElementById('main-btn'),
        mult: document.getElementById('mult'),
        status: document.getElementById('status'),
        rocket: document.getElementById('rocket'),
        vid: document.getElementById('vid'),
        wait: document.getElementById('wait-box'),
        fill: document.getElementById('fill'),
        ui: document.getElementById('ui-block'),
        bal: document.getElementById('balance'),
        betInp: document.getElementById('bet-sum'),
        autoCheck: document.getElementById('auto-enabled'),
        autoVal: document.getElementById('auto-val')
    };

    function initWait() {
        isFlying = false;
        betPlaced = false;
        els.wait.style.display = 'block';
        els.rocket.style.display = 'none';
        els.mult.style.display = 'none';
        els.status.style.display = 'none';
        els.ui.classList.remove('disabled-ui');
        
        els.btn.innerText = 'СТАВКА';
        els.btn.className = 'main-btn';
        els.btn.onclick = placeBet;

        let progress = 0;
        let timer = setInterval(() => {
            progress += 2; // Ускорил ожидание до 5 секунд
            els.fill.style.width = progress + '%';
            if(progress >= 100) {
                clearInterval(timer);
                startFlight();
            }
        }, 100);
    }

    function placeBet() {
        let sum = parseInt(els.betInp.value);
        if(sum > stars) {
            alert("Недостаточно звезд!");
            return;
        }
        stars -= sum;
        els.bal.innerText = stars + ' ⭐';
        betPlaced = true;
        els.btn.innerText = 'ГОТОВО';
        els.btn.classList.add('btn-gray');
        els.btn.onclick = null;
    }

    function startFlight() {
        isFlying = true;
        els.wait.style.display = 'none';
        els.rocket.style.display = 'block';
        els.mult.style.display = 'block';
        els.mult.style.color = 'white';
        els.vid.play();
        
        els.ui.classList.add('disabled-ui');

        if(betPlaced) {
            els.btn.innerText = 'ЗАБРАТЬ';
            els.btn.className = 'main-btn btn-green';
            els.btn.onclick = cashOut;
        } else {
            els.btn.innerText = 'ПОЛЕТ...';
            els.btn.className = 'main-btn btn-gray';
            els.btn.onclick = null;
        }

        currentX = 1.00;
        let crashPoint = 1.01 + (Math.random() * 4); // Случайный икс

        gameLoop = setInterval(() => {
            currentX += 0.01 + (currentX * 0.008); // Ускоренный рост
            els.mult.innerText = currentX.toFixed(2) + 'x';
            
            // Авто-вывод
            if(betPlaced && els.autoCheck.checked) {
                if(currentX >= parseFloat(els.autoVal.value)) cashOut();
            }

            if(currentX >= crashPoint) boom();
        }, 80);
    }

    function cashOut() {
        if(!betPlaced) return;
        let win = Math.floor(parseInt(els.betInp.value) * currentX);
        stars += win;
        els.bal.innerText = stars + ' ⭐';
        betPlaced = false;
        els.btn.innerText = 'ВЫПЛАТА';
        els.btn.className = 'main-btn btn-gray';
        els.btn.onclick = null;
    }

    function boom() {
        clearInterval(gameLoop);
        els.vid.pause();
        els.mult.style.color = '#ff4d4d';
        els.status.style.display = 'block';
        els.btn.innerText = 'УЛЕТЕЛА';
        els.btn.className = 'main-btn btn-gray';
        els.btn.onclick = null;
        setTimeout(initWait, 2500);
    }

    initWait();
</script>
</body>
</html>
