<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Mobile Game</title>
    <style>
        body {
            background-color: #000033; /* Твой синий фон */
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            align-items: center;
            height: 100vh; overflow: hidden;
            font-family: sans-serif;
        }

        .header {
            width: 100%; padding: 20px 0;
            display: flex; justify-content: center;
        }
        .balance-img {
            width: 110px; height: auto;
            filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.4));
        }

        .menu-container {
            flex: 1;
            display: flex; flex-direction: column;
            justify-content: center;
            gap: 20px; width: 85%; max-width: 380px;
        }

        .game-btn {
            width: 100%;
            cursor: pointer;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
        }

        .game-btn:active { transform: scale(0.96); }

        .game-btn img {
            width: 100%; height: auto; display: block;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="image_3afed4.png" class="balance-img" alt="Balance">
    </div>

    <div class="menu-container">
        
        <div class="game-btn" onclick="alert('Открываем Рулетку...')">
            <img src="rulekta.png" alt="Рулетка">
        </div>

        <div class="game-btn" onclick="alert('Открываем Апгрейд...')">
            <img src="apgrade.png" alt="Апгрейд">
        </div>

    </div>

</body>
</html>
