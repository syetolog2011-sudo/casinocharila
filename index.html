<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Mobile Game</title>
    <style>
        /* ТВОЙ ЦВЕТ ФОНА */
        html, body {
            background-color: #02132f !important; 
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center;
            font-family: sans-serif;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ СО ЗВЕЗДАМИ */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px 0;
        }

        .balance-item {
            background: #1c253d; /* Темная подложка как на скрине */
            border-radius: 20px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            height: 40px;
        }

        /* Твои будущие картинки звезды и плюса */
        .balance-item img.star-icon { width: 24px; height: 24px; }
        .balance-item img.plus-icon { width: 22px; height: 22px; cursor: pointer; }
        
        .balance-item span { 
            color: white; 
            font-weight: bold; 
            font-size: 18px; 
        }

        /* ТВОЙ КОНТЕЙНЕР С КНОПКАМИ */
        .menu-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 10px;
        }

        .game-btn {
            width: 100%;
            cursor: pointer;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .game-btn:active { transform: scale(0.96); }

        .game-btn img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="balance-item">
            <img src="star.png" alt="⭐" class="star-icon"> 
            <span>125</span>
            <img src="plus.jpg" alt="+" class="plus-icon" onclick="alert('Пополнение')">
        </div>
    </div>

    <div class="menu-container">
        <div class="game-btn" onclick="alert('Рулетка!')">
            <img src="ruletka.jpg" alt="Рулетка">
        </div>

        <div class="game-btn" onclick="alert('Апгрейд!')">
            <img src="upgrade.jpg" alt="Апгрейд">
        </div>
    </div>

</body>
</html>
