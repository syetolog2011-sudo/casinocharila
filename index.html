<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Case Opener</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #1a1a1c;
            --accent: #47a1ff;
            --epic: #f1c40f;
            --rare: #3498db;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header { text-align: center; margin-bottom: 25px; }
        .balance { color: var(--accent); font-weight: bold; font-size: 20px; }

        /* Контейнер рулетки */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 160px;
            background: #0f0f11;
            border: 2px solid #222;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            align-items: center;
            box-shadow: inset 0 0 40px #000;
        }

        /* Виньетка по бокам (градиентное затемнение) */
        .roulette-wrapper::before, .roulette-wrapper::after {
            content: "";
            position: absolute;
            top: 0;
            width: 80px;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }
        .roulette-wrapper::before { left: 0; background: linear-gradient(to right, var(--bg), transparent); }
        .roulette-wrapper::after { right: 0; background: linear-gradient(to left, var(--bg), transparent); }

        .center-line {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 100%;
            background: #fff;
            z-index: 10;
            box-shadow: 0 0 15px #fff;
        }

        .tape {
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 5s cubic-bezier(0.15, 0, 0.05, 1);
        }

        /* Карточки NFT */
        .nft-card {
            min-width: 125px;
            height: 125px;
            background: var(--card-bg);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 5px solid #333;
            flex-shrink: 0;
        }

        .nft-card img { width: 85px; height: 85px; object-fit: contain; }

        /* Подсветка редкости */
        .nft-card.epic { border-color: var(--epic); background: radial-gradient(circle, #2c250a 0%, #1a1a1c 100%); }
        .nft-card.rare { border-color: var(--rare); background: radial-gradient(circle, #0a1b2c 0%, #1a1a1c 100%); }

        .btn {
            width: 100%;
            max-width: 400px;
            padding: 22px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 22px;
            font-weight: 900;
            font-size: 18px;
            margin-top: 40px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0; letter-spacing: 2px;">КЕЙС «FROZEN» ❄️</h2>

    </div>

    <div class="roulette-wrapper">

        <div class="tape" id="tape"></div>
