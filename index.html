<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            width: 90%;
        }
        .case-box {
            width: 100%;
            height: 150px;
            background: #161618;
            border: 2px solid #333;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 30px;
        }
        .btn {
            background: white;
            color: black;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            width: 100%;
            cursor: pointer;
        }
        .balance {
            color: #47a1ff;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Кейс «Frozen» ❄️</h1>
        <div class="balance">Баланс: <span id="coins">0</span> 💎</div>
        <div class="case-box" id="box">🎁</div>
        <button class="btn" onclick="openCase()">ОТКРЫТЬ КЕЙС</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function openCase() {
            let box = document.getElementById('box');
            box.innerHTML = "🎰";
            setTimeout(() => {
                box.innerHTML = "🐸"; // Типа выпал лягушонок
                document.getElementById('coins').innerText = "10";
            }, 1000);
        }
    </script>
</body>
</html>
