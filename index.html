<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Star Pro</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; font-family: 'Segoe UI', Roboto, sans-serif;
            color: white; overflow: hidden;
        }

        .app-container { display: flex; flex-direction: column; height: 100vh; background: #000; }

        /* HEADER */
        .header { padding: 10px 15px; z-index: 10; background: #000; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .balance-badge { background: #1a1a1a; padding: 6px 15px; border-radius: 20px; font-weight: bold; color: #ffcc00; }

        /* ИСТОРИЯ */
        .history-row { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; }
        .hist-item { background: #111; padding: 4px 12px; border-radius: 8px; font-size: 12px; color: #666; border: 1px solid #222; }

        /* ИГРОВАЯ ЗОНА */
        .game-area { flex: 1; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .mult-display { text-align: center; position: absolute; top: 10%; z-index: 10; }
        .multiplier { font-size: 80px; font-weight: 900; text-shadow: 0 0 30px rgba(163, 71, 255, 0.8); }
        .boom-text { color: #ff4d4d; font-size: 28px; font-weight: bold; margin-top: -10px; display: none; }

        /* ОЖИДАНИЕ */
        .waiting-area { position: absolute; top: 40%; width: 80%; display: flex; flex-direction: column; align-items: center; z-index: 8; }
        .progress-bar { width: 100%; height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { width: 0%; height: 100%; background: #6a11cb; }

        /* РАКЕТА */
        .rocket-container { width: 220px; height: 220px; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: none; }
        .rocket-container video { width: 100%; height: 100%; object-fit: contain; }

        /* ИНТЕРФЕЙС СНИЗУ */
        .bottom-panel { background: #0d0d0d; border-radius: 28px 28px 0 0; padding: 20px; border-top: 1px solid #1a1a1a; }
        .main-btn { background: #6a11cb; border: none; border-radius: 16px; color: white; padding: 18px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; }
        .main-btn.cashout { background: #4cd137; }
        .main-btn.waiting { background: #333; cursor: default; }

        .controls-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .input-row { background: #141414; border-radius: 14px; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .input-row input { background: transparent; border: none; color: white; font-size: 18px; width: 60px; outline: none; }
        .label { color: #888; font-size: 14px; }

        /* БЛОКИРОВКА */
        .disabled { opacity: 0.3; pointer-events: none; filter: grayscale(1); }

        .quick-bets { display: flex; gap: 8px; margin-top: 5px; }
        .q-btn { background: #1c1c1e; border: none; color: white; flex: 1; padding: 10px; border-radius: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="top-nav">
            <div>← Назад <span style="margin-left:10px">Даниил</span></div>
            <div class="balance-badge" id="user-balance">125 ⭐</div>
        </div>
        <div class="history-row" id="history-row"></div>
    </div>

    <div class="game-area">
        <div class="mult-display">
            <div class="multiplier" id="mult-text" style="display:none;">1.00x</div>
            <div class="boom-text" id="boom-text">Улетела</div>
        </div>
        <div class="waiting-area" id="wait-area">
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            <div>Ожидание раунда...</div>
        </div>
        <div class="rocket-container" id="rocket-box">
            <video id="rocket-vid" loop muted playsinline><source src="13879313762885.mp4" type="video/mp4"></video>
        </div>
    </div>

    <div class="bottom-panel">
        <button class="main-btn" id="action-btn">СТАВКА</button>
        
        <div class="controls-grid" id="controls">
            <div class="input-row">
                <span class="label">Авто-вывод</span>
                <div><input type="number" id="auto-val" value="2.0" step="0.1"> <span style="color:#a347ff">x</span></div>
            </div>
            <div class="input-row">
                <span class="label">Ставка</span>
                <div><input type="number" id="bet-amount" value="10"> <span style="color:#ffcc00">⭐</span></div>
            </div>
            <div class="quick-bets">
                <button class="q-btn" onclick="addBet(1)">+1</button>
                <button class="q-btn" onclick="addBet(5)">+5</button>
                <button class="q-btn" onclick="addBet(10)">+10</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentX = 1.00;
    let targetCrash = 0;
    let gameInterval;
    let isFlying = false;
    let hasCashedOut = false;
    let history = [1.54, 2.10, 1.01, 5.40];

    const els = {
        btn: document.getElementById('action-btn'),
        mult: document.getElementById('mult-text'),
        boom: document.getElementById('boom-text'),
        rocket: document.getElementById('rocket-box'),
        vid: document.getElementById('rocket-vid'),
        wait: document.getElementById('wait-area'),
        bar: document.getElementById('progress-fill'),
        controls: document.getElementById('controls'),
        auto: document.getElementById('auto-val'),
        hist: document.getElementById('history-row')
    };

    function addBet(v) { 
        let b = document.getElementById('bet-amount');
        b.value = parseInt(b.value) + v;
    }

    function updateHistory() {
        els.hist.innerHTML = history.slice(-6).reverse().map(x => `<div class="hist-item" style="color:${x>10?'#a347ff':''}">${x.toFixed(2)}x</div>`).join('');
    }

    // УМНЫЙ ГЕНЕРАТОР ИКСОВ
    function generateCrashPoint() {
        let lastX = history[history.length - 1];
        let rand = Math.random();
        
        // Если прошлый икс был > 10, даем 30% шанс на моментальный слив 1.01x
        if (lastX > 10 && rand < 0.3) return 1.01;
        
        // Шанс на 100x (редко)
        if (rand > 0.98) return 10 + Math.random() * 90;
        
        // Обычные иксы
        return 1 + (Math.pow(Math.random(), -1.2) - 1);
    }

    function initWaiting() {
        isFlying = false;
        hasCashedOut = false;
        els.btn.className = 'main-btn';
        els.btn.innerText = 'СТАВКА (ЖДЕМ)';
        els.controls.classList.remove('disabled');
        els.wait.style.display = 'flex';
        els.rocket.style.display = 'none';
        els.mult.style.display = 'none';
        els.boom.style.display = 'none';
        updateHistory();

        let p = 0;
        let timer = setInterval(() => {
            p += 1.5;
            els.bar.style.width = p + '%';
            if (p >= 100) { clearInterval(timer); startRound(); }
        }, 50);
    }

    function startRound() {
        isFlying = true;
        targetCrash = generateCrashPoint();
        currentX = 1.00;
        
        els.wait.style.display = 'none';
        els.controls.classList.add('disabled');
        els.rocket.style.display = 'flex';
        els.vid.play();
        els.mult.style.display = 'block';
        els.mult.style.color = 'white';
        
        els.btn.className = 'main-btn cashout';
        els.btn.innerText = 'ЗАБРАТЬ';
        els.btn.onclick = cashOut;

        gameInterval = setInterval(() => {
            // УСКОРЕНИЕ: чем выше икс, тем быстрее он растет
            let speed = 0.005 + (currentX * 0.006);
            currentX += speed;
            els.mult.innerText = currentX.toFixed(2) + 'x';

            // Авто-вывод
            if (!hasCashedOut && currentX >= parseFloat(els.auto.value)) cashOut();

            // Взрыв
            if (currentX >= targetCrash) crash();
        }, 80);
    }

    function cashOut() {
        if (hasCashedOut || !isFlying) return;
        hasCashedOut = true;
        els.btn.className = 'main-btn waiting';
        els.btn.innerText = 'ВЫ ЗАБРАЛИ!';
        // Ракета летит дальше!
    }

    function crash() {
        clearInterval(gameInterval);
        isFlying = false;
        history.push(currentX);
        els.vid.pause();
        els.mult.style.color = '#ff4d4d';
        els.boom.style.display = 'block';
        els.btn.className = 'main-btn waiting';
        els.btn.innerText = 'УЛЕТЕЛА';
        
        setTimeout(initWaiting, 3000);
    }

    initWaiting();
</script>
</body>
</html>
