<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Mobile Game</title>
    <style>
        html, body {
            background-color: #02132f !important; 
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            -webkit-user-select: none;
        }

        /* ПАНЕЛЬ БАЛАНСА */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 25px 0 15px 0;
        }

        .balance-item {
            background: #1c253d;
            border-radius: 25px;
            padding: 4px 10px 4px 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 38px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* ВСТРОЕННАЯ ЗВЕЗДА */
        .star-wrapper {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
        }

        .balance-text { 
            color: white; font-weight: 800; font-size: 18px; margin: 0 5px;
        }

        /* СИНИЙ ПЛЮС */
        .plus-btn {
            background: #3b82f6;
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: none;
        }

        /* КОНТЕЙНЕР ДЛЯ ТВОИХ JPG КАРТИНОК */
        .menu-container {
            width: 90%;
            max-width: 400px;
            display: flex; flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        .game-btn {
            width: 100%;
            cursor: pointer;
            border-radius: 20px;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .game-btn img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="balance-item">
            <div class="star-wrapper">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="star-grad" x1="12" y1="2" x2="12" y2="22" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#FFEB3B"/>
                            <stop offset="1" stop-color="#FF9800"/>
                        </linearGradient>
                    </defs>
                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="url(#star-grad)" stroke="#BF360C" stroke-width="0.5"/>
                    <circle cx="12" cy="10" r="1" fill="white" fill-opacity="0.8"/>
                </svg>
            </div>
            <span class="balance-text">125</span>
            <button class="plus-btn" onclick="alert('Магазин')">
                <svg width="14" height="14" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 2V10M2 6H10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="menu-container">
        <div class="game-btn" onclick="alert('Рулетка!')">
            <img src="ruletka.jpg" alt="Рулетка">
        </div>

        <div class="game-btn" onclick="alert('Апгрейд!')">
            <img src="upgrade.jpg" alt="Апгрейд">
        </div>
    </div>

</body>
</html>
