<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Mobile Game</title>
    <style>
        /* ОСНОВНОЙ ТЕМНО-СИНИЙ ФОН */
        body {
            background-color: #000033; /* Твой фирменный цвет */
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            justify-content: center; /* Кнопки по центру вертикали */
            align-items: center; /* Кнопки по центру горизонтали */
            height: 100vh; overflow: hidden;
        }

        /* Общий стиль для кнопок-картинок */
        .game-btn {
            width: 90%; /* Ширина кнопки - 90% от экрана телефона */
            max-width: 400px; /* Максимальная ширина, чтобы на планшетах не были гигантскими */
            margin-bottom: 20px; /* Отступ между кнопками */
            transition: transform 0.1s; /* Легкая анимация нажатия */
            -webkit-tap-highlight-color: transparent; /* Убираем синий квадрат при нажатии на мобилках */
            cursor: pointer;
        }
        
        /* Эффект нажатия (кнопка слегка сжимается) */
        .game-btn:active { transform: scale(0.96); }

        .game-btn img {
            width: 100%; height: auto; display: block;
        }
    </style>
</head>
<body>

    <div class="game-btn" onclick="console.log('Open Roulette')">
        <img src="btn_roulette.png" alt="Рулетка">
    </div>

    <div class="game-btn" onclick="console.log('Open Upgrade')">
        <img src="btn_upgrade.png" alt="Апгрейд">
    </div>

</body>
</html>
