<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Game</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; font-family: 'Segoe UI', Roboto, sans-serif;
            color: white; overflow: hidden;
        }

        .app-container {
            display: flex; flex-direction: column; height: 100vh;
            background: radial-gradient(circle at top, #2b0a4d 0%, #000000 80%);
            position: relative;
        }

        /* HEADER */
        .header { padding: 10px 15px; z-index: 10; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .user-info { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .balance-badge {
            background: rgba(255,255,255,0.05); padding: 6px 15px; border-radius: 20px;
            display: flex; align-items: center; gap: 6px; font-weight: bold;
        }

        /* ИСТОРИЯ */
        .history-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .hist-item {
            background: rgba(255,255,255,0.03); padding: 5px 14px; border-radius: 10px;
            font-size: 13px; color: #888;
        }

        /* ИГРОВАЯ ЗОНА */
        .game-area {
            flex: 1; position: relative;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .mult-display { text-align: center; position: absolute; top: 15%; z-index: 10; }
        .multiplier { font-size: 70px; font-weight: 900; text-shadow: 0 0 20px rgba(163, 71, 255, 0.6); }
        .boom-text { color: #ff4d4d; font-size: 26px; font-weight: bold; margin-top: -5px; display: none; }

        /* ОЖИДАНИЕ */
        .waiting-area {
            position: absolute; top: 45%; width: 80%;
            display: flex; flex-direction: column; align-items: center; z-index: 8;
        }
        .progress-bar {
            width: 100%; height: 6px; background: rgba(255,255,255,0.05);
            border-radius: 3px; overflow: hidden; margin-bottom: 12px;
        }
        .progress-fill { width: 0%; height: 100%; background: #6a11cb; border-radius: 3px; transition: width 0.1s linear; }
        .waiting-status { font-size: 16px; color: white; }

        /* РАКЕТА (НОВОЕ ВИДЕО) */
        .rocket-container {
            width: 200px; height: 200px;
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            display: none; /* Скрыта в ожидании */
        }
        .rocket-container video { width: 100%; height: 100%; object-fit: contain; }

        .grid-floor {
            position: absolute; bottom: 0; width: 200%; height: 35%;
            background-image: 
                linear-gradient(rgba(163, 71, 255, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(163, 71, 255, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(70deg); transform-origin: bottom;
            left: -50%; z-index: 1;
            mask-image: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0));
        }

        /* ПАНЕЛЬ СТАВОК */
        .bottom-panel { background: #0a0a0a; border-radius: 24px 24px 0 0; padding: 20px; z-index: 10; border-top: 1px solid #1a1a1a; }
        .main-btn {
            background: #6a11cb; border: none; border-radius: 16px; color: white;
            padding: 18px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer;
        }
        .bet-input-box {
            background: #141414; border-radius: 14px; padding: 15px;
            display: flex; align-items: center; justify-content: space-between; margin: 15px 0; border: 1px solid #222;
        }
        .bet-input-box input { background: transparent; border: none; color: white; font-size: 20px; width: 60%; outline: none; }
        .quick-bets { display: flex; gap: 8px; }
        .q-btn { background: #1a1a1a; border: 1px solid #333; color: white; flex: 1; padding: 10px; border-radius: 10px; font-size: 14px; }

        .tab-bar { display: flex; justify-content: space-around; padding: 12px 0; background: #000; border-top: 1px solid #111; }
        .tab-item { font-size: 10px; color: #444; text-align: center; }
        .tab-item.active { color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="top-nav">
            <div class="user-info">← Назад <span>Даниил</span></div>
            <div class="header-right"><div class="balance-badge">0 💎</div></div>
        </div>
        <div class="history-row">
            <div class="hist-item">8.17x</div><div class="hist-item">2.14x</div><div class="hist-item" style="color: #a347ff;">84.23x</div><div class="hist-item">1.28x</div>
        </div>
    </div>

    <div class="game-area">
        <div class="mult-display">
            <div class="multiplier" id="mult-text" style="display:none;">1.00x</div>
            <div class="boom-text" id="boom-text">Улетела</div>
        </div>

        <div class="waiting-area" id="waiting-area">
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            <div class="waiting-status">Ожидание следующего раунда...</div>
        </div>

        <div class="rocket-container" id="rocket-box">
            <video id="rocket-vid" loop muted playsinline>
                <source src="13879313762885.mp4" type="video/mp4">
            </video>
        </div>
        <div class="grid-floor"></div>
    </div>

    <div class="bottom-panel">
        <button class="main-btn" id="main-action">Ожидание</button>
        <div class="bet-input-box"><input type="number" value="1"> <span style="color: #5fb4f8;">💎</span></div>
        <div class="quick-bets">
            <button class="q-btn">+1 💎</button><button class="q-btn">+5 💎</button><button class="q-btn">+10 💎</button>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item">🏆<br>Лидерборд</div><div class="tab-item active">🎮<br>Играть</div><div class="tab-item">⚡<br>Задания</div><div class="tab-item">👤<br>Профиль</div>
    </div>
</div>

<script>
    let currentX = 1.00;
    let gameInterval;
    let waitTimer;

    const els = {
        rocket: document.getElementById('rocket-box'),
        vid: document.getElementById('rocket-vid'),
        waitArea: document.getElementById('waiting-area'),
        progressFill: document.getElementById('progress-fill'),
        mult: document.getElementById('mult-text'),
        boom: document.getElementById('boom-text'),
        btn: document.getElementById('main-action')
    };

    function runCycle() {
        // Фаза: Ожидание
        els.rocket.style.display = 'none';
        els.mult.style.display = 'none';
        els.boom.style.display = 'none';
        els.waitArea.style.display = 'flex';
        els.btn.innerText = 'Ожидание';
        els.btn.style.background = '#6a11cb';

        let progress = 0;
        els.progressFill.style.width = '0%';
        waitTimer = setInterval(() => {
            progress += 2;
            els.progressFill.style.width = progress + '%';
            if (progress >= 100) {
                clearInterval(waitTimer);
                startFlight();
            }
        }, 100);
    }

    function startFlight() {
        els.waitArea.style.display = 'none';
        els.rocket.style.display = 'flex';
        els.vid.play();
        els.mult.style.display = 'block';
        els.mult.style.color = 'white';
        currentX = 1.00;
        els.btn.innerText = 'Забрать';
        els.btn.style.background = '#4cd137';

        gameInterval = setInterval(() => {
            currentX += 0.01 + (currentX * 0.004);
            els.mult.innerText = currentX.toFixed(2) + 'x';
            if (Math.random() < 0.012) {
                crash();
            }
        }, 100);
    }

    function crash() {
        clearInterval(gameInterval);
        els.vid.pause();
        els.mult.style.color = '#ff4d4d';
        els.boom.style.display = 'block';
        els.btn.innerText = 'BOOM!';
        els.btn.style.background = '#ff4d4d';
        setTimeout(runCycle, 3000);
    }

    runCycle();
</script>
</body>
</html>
