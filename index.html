<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gift Jackpot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #0a0a0a; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        
        .balance { color: #47a1ff; font-weight: bold; margin-bottom: 20px; }

        /* Контейнер рулетки */
        .window {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 120px;
            background: #161618;
            border-radius: 16px;
            border: 1px solid #28282a;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .pointer {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: #fff;
            z-index: 10;
            box-shadow: 0 0 10px #fff;
        }

        .list {
            display: flex;
            gap: 10px;
            padding: 0 10px;
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .card {
            min-width: 90px;
            height: 90px;
            background: #242426;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card img { width: 60px; }

        .btn {
            width: 100%;
            max-width: 400px;
            padding: 18px;
            background: white;
            color: black;
            border: none;
            border-radius: 16px;
            font-weight: bold;
            font-size: 18px;
            margin-top: 30px;
            cursor: pointer;
        }

        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <h2>Кейс «Frozen» ❄️</h2>
    <div class="balance">Баланс: <span id="val">100</span> 💎</div>

    <div class="window">
        <div class="pointer"></div>
        <div class="list" id="list"></div>
    </div>

    <button class="btn" onclick="spin()">ОТКРЫТЬ КЕЙС</button>

    <script>
        const list = document.getElementById('list');
        const items = ['frog', 'orange', 'rose', 'christmas-star'];
        
        // Заполняем ленту (50 штук)
        for (let i = 0; i < 50; i++) {
            const name = items[i % 4];
            list.innerHTML += `<div class="card"><img src="https://img.icons8.com/fluency/96/${name}.png"></div>`;
        }

        function spin() {
            const move = Math.floor(Math.random() * 1000) + 2500;
            list.style.transform = `translateX(-${move}px)`;
            
            setTimeout(() => {
                alert("Выпал редкий предмет! 🎁");
                list.style.transition = 'none';
                list.style.transform = 'translateX(0)';
                setTimeout(() => list.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)', 50);
            }, 4500);
        }

        // Инициализация TG
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
