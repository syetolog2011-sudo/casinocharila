<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette Case</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Окно рулетки */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 180px;
            border: 2px solid #333;
            background: #1a1a1a;
            border-radius: 15px;
            overflow: hidden; /* Скрываем лишние предметы */
            box-shadow: inset 0 0 20px #000;
        }

        /* Указатель (стрелочка сверху) */
        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: #ff004c;
            z-index: 10;
            box-shadow: 0 0 15px #ff004c;
        }

        /* Сама лента с предметами */
        .roulette-track {
            display: flex;
            position: absolute;
            top: 15px;
            left: 0;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); /* Плавное замедление */
            will-change: transform;
        }

        .item {
            min-width: 130px;
            height: 130px;
            margin: 10px;
            background: #252525;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 4px solid #444;
        }

        .item img {
            width: 90px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        /* Кнопка */
        .btn-open {
            margin-top: 40px;
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #ff004c, #ff6b00);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 0, 76, 0.4);
            transition: 0.3s;
        }

        .btn-open:active {
            transform: scale(0.95);
        }

        .btn-open:disabled {
            background: #444;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div class="roulette-track" id="track">
            </div>
    </div>

    <button class="btn-open" id="spinBtn" onclick="spin()">ОТКРЫТЬ ЗА 100$</button>

    <script>
        const track = document.getElementById('track');
        const btn = document.getElementById('spinBtn');
        const imgUrl = "https://storage.portal-market.com/portals-market/gifts/chillflame/models/png/losangeles.png";
        
        // Создаем много предметов для ленты
        const totalItems = 50;
        for (let i = 0; i < totalItems; i++) {
            const item = document.createElement('div');
            item.className = 'item';
            // Меняем цвет рамки у некоторых, типа "редкие"
            if (i === 45) item.style.borderColor = "#00d2ff"; 
            
            item.innerHTML = `<img src="${imgUrl}" alt="item">`;
            track.appendChild(item);
        }

        function spin() {
            btn.disabled = true;
            
            const itemWidth = 150; // Ширина предмета (130) + margin (20)
            const winItemIndex = 45; // Какой по счету предмет выиграет
            
            // Рассчитываем смещение, чтобы нужный предмет встал в центр
            const trackCenter = 300; // Половина ширины wrapper (600/2)
            const finalOffset = (winItemIndex * itemWidth) - trackCenter + (itemWidth / 2);
            
            // Добавляем немного рандома внутри самого предмета
            const randomInnerShift = Math.floor(Math.random() * 60) - 30;
            
            track.style.transform = `translateX(-${finalOffset + randomInnerShift}px)`;

            // Когда анимация закончится
            setTimeout(() => {
                alert("Поздравляем! Ты выбил L.A. Chill!");
                // Сброс позиции для нового раза
                track.style.transition = "none";
                track.style.transform = "translateX(0)";
                setTimeout(() => {
                    track.style.transition = "transform 5s cubic-bezier(0.15, 0, 0.15, 1)";
                    btn.disabled = false;
                }, 50);
            }, 5500);
        }
    </script>
</body>
</html>
