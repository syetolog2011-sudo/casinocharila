<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Upgrade Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #050505; --card-bg: #1a1a1c; --accent: #47a1ff;
            --epic: #f1c40f; --rare: #3498db; --common: #95a5a6; --nav-bg: #111;
        }

        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { padding: 15px; text-align: center; background: rgba(255,255,255,0.05); border-bottom: 1px solid #222; }
        .stars-display { color: var(--epic); font-weight: bold; font-size: 22px; }
        .content { flex: 1; overflow-y: auto; padding: 20px; display: none; padding-bottom: 100px; }
        .content.active { display: block; }

        /* Рулетка Кейса */
        .roulette-wrapper { position: relative; width: 100%; height: 160px; background: #0f0f11; border: 2px solid #222; border-radius: 24px; overflow: hidden; display: flex; align-items: center; margin-top: 20px; }
        .center-line { position: absolute; left: 50%; transform: translateX(-50%); width: 3px; height: 100%; background: #fff; z-index: 10; box-shadow: 0 0 15px #fff; }
        .tape { display: flex; align-items: center; gap: 12px; padding: 0 10px; transition: transform 5s cubic-bezier(0.15, 0, 0.05, 1); }
        .nft-card { min-width: 125px; height: 125px; background: var(--card-bg); border-radius: 20px; overflow: hidden; border-bottom: 5px solid #333; flex-shrink: 0; }
        .nft-card img { width: 100%; height: 100%; object-fit: cover; }

        /* Апгрейд Шкала */
        .upgrade-zone { text-align: center; margin-top: 10px; }
        .upgrade-slot { width: 130px; height: 130px; border: 2px dashed #444; border-radius: 25px; margin: 15px auto; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.02); overflow: hidden; }
        .upgrade-slot img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Стили полоски */
        .upgrade-bar-container { position: relative; width: 100%; height: 30px; background: #222; border-radius: 15px; margin: 20px 0; overflow: hidden; border: 1px solid #444; }
        .success-zone { position: absolute; height: 100%; background: #2ecc71; box-shadow: 0 0 15px #2ecc71; transition: 0.3s; }
        .pointer { position: absolute; top: 0; width: 4px; height: 100%; background: #fff; box-shadow: 0 0 10px #fff; z-index: 5; left: 0%; }

        /* Инвентарь */
        .inventory-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .inv-item { background: #1a1a1c; border-radius: 20px; padding: 10px; text-align: center; border: 1px solid #333; }
        .inv-item img { width: 100%; aspect-ratio: 1/1; border-radius: 15px; object-fit: cover; }

        /* Навигация */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: var(--nav-bg); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .nav-item { color: #555; text-align: center; cursor: pointer; flex: 1; }
        .nav-item.active { color: white; }
        .nav-item.center-btn { background: var(--accent); color: white; border-radius: 50%; width: 60px; height: 60px; flex: none; display: flex; flex-direction: column; justify-content: center; margin-bottom: 30px; box-shadow: 0 5px 15px rgba(71, 161, 255, 0.4); }

        .btn-main { width: 100%; padding: 18px; background: #fff; color: #000; border-radius: 18px; font-weight: 900; border: none; cursor: pointer; }
        .btn-main:disabled { opacity: 0.3; }
        #winModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="stars-display">⭐ <span id="starCount">1000</span></div>
    </div>

    <div id="tab-roulette" class="content active">
        <h3 style="text-align: center;">КЕЙС «FROZEN» ❄️</h3>
        <div class="roulette-wrapper"><div class="center-line"></div><div id="tape" class="tape"></div></div>
        <button class="btn-main" style="margin-top: 30px;" id="spinBtn" onclick="startSpin()">ОТКРЫТЬ (100 ⭐)</button>
    </div>

    <div id="tab-upgrade" class="content">
        <h3 style="text-align: center;">UPGRADE ⚡</h3>
        <div class="upgrade-zone">
            <div class="upgrade-slot" id="upgradeSlot"><span>Выбери предмет</span></div>
            
            <div class="upgrade-bar-container">
                <div id="successZone" class="success-zone" style="width: 0%; left: 0%;"></div>
                <div id="pointer" class="pointer"></div>
            </div>

            <div id="chanceLabel" style="margin-bottom: 10px; font-weight: bold; color: #2ecc71;">Шанс: --%</div>
            <button class="btn-main" id="upgradeBtn" disabled onclick="processUpgrade()">УЛУЧШИТЬ</button>
        </div>
    </div>

    <div id="tab-profile" class="content">
        <h3 style="text-align: center;">ИНВЕНТАРЬ 🎒</h3>
        <div id="inventory" class="inventory-grid"></div>
    </div>

    <div id="winModal">
        <div id="winPhotoContainer"></div>
        <div style="width: 280px; margin-top: 20px;">
            <button class="btn-main" style="background:#2ecc71; color:#fff" onclick="toInventory()">ЗАБРАТЬ</button>
            <button class="btn-main" style="background:#e74c3c; color:#fff; margin-top: 10px;" id="quickSellBtn">ПРОДАТЬ</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('roulette', this)"><div>🎰</div><div>Кейс</div></div>
        <div class="nav-item center-btn" onclick="switchTab('upgrade', this)"><div>⚡</div><div>Up</div></div>
        <div class="nav-item" id="nav-profile" onclick="switchTab('profile', this)"><div>👤</div><div>Профиль</div></div>
    </div>

    <script>
        let stars = 1000; let inventory = []; let selectedForUpgrade = null; let currentWinningItem = null;
        const itemsConfig = [
            { rarity: 'common', img: 'https://raw.githubusercontent.com/syetolog2011-sudo/casinocharila/main/photo_5296748618452769466_m.jpg', price: 20, upChance: 10 },
            { rarity: 'rare', img: 'https://raw.githubusercontent.com/syetolog2011-sudo/casinocharila/main/photo_5296748618452769469_m (1).jpg', price: 125, upChance: 25 },
            { rarity: 'epic', img: 'https://raw.githubusercontent.com/syetolog2011-sudo/casinocharila/main/photo_5296748618452769416_m.jpg', price: 525 }
        ];

        function switchTab(tabName, el) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            el.classList.add('active');
            if(tabName === 'profile') renderInventory();
        }

        function buildTape() {
            const tape = document.getElementById('tape'); tape.innerHTML = '';
            for (let i = 0; i < 80; i++) {
                let item = itemsConfig[Math.floor(Math.random()*3)];
                const card = document.createElement('div'); card.className = `nft-card`;
                card.innerHTML = `<img src="${item.img}">`; tape.appendChild(card);
            }
        }

        function startSpin() {
            if (stars < 100) return alert("Мало звезд!");
            stars -= 100; updateStars();
            document.getElementById('spinBtn').disabled = true;
            let rand = Math.random() * 100;
            currentWinningItem = rand < 50 ? itemsConfig[0] : (rand < 85 ? itemsConfig[1] : itemsConfig[2]);
            const winIndex = 60; const cards = document.getElementById('tape').querySelectorAll('.nft-card');
            cards[winIndex].innerHTML = `<img src="${currentWinningItem.img}">`;
            const offset = (winIndex * 137) - (document.querySelector('.roulette-wrapper').offsetWidth / 2) + 68;
            const tape = document.getElementById('tape');
            tape.style.transition = 'none'; tape.style.transform = 'translateX(0)';
            setTimeout(() => { tape.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.05, 1)'; tape.style.transform = `translateX(-${offset}px)`; }, 50);
            setTimeout(() => {
                document.getElementById('winModal').style.display = 'flex';
                document.getElementById('winPhotoContainer').innerHTML = `<img src="${currentWinningItem.img}" style="width:280px;height:280px;border-radius:30px;object-fit:cover;border:4px solid #fff">`;
                document.getElementById('quickSellBtn').onclick = () => { stars += currentWinningItem.price; updateStars(); closeModal(); };
            }, 5500);
        }

        function toInventory() { inventory.push({...currentWinningItem}); closeModal(); }
        function closeModal() { document.getElementById('winModal').style.display = 'none'; document.getElementById('spinBtn').disabled = false; buildTape(); }

        function renderInventory() {
            const invGrid = document.getElementById('inventory');
            invGrid.innerHTML = inventory.length === 0 ? '<p style="grid-column:1/3;text-align:center">Пусто</p>' : '';
            inventory.forEach((item, index) => {
                const div = document.createElement('div'); div.className = 'inv-item';
                div.innerHTML = `<img src="${item.img}">
                    <button class="btn-main" style="padding:10px;font-size:12px;margin-top:5px;background:#47a1ff;color:#fff" onclick="selectForUpgrade(${index})">ВЫБРАТЬ</button>
                    <button class="btn-main" style="padding:10px;font-size:12px;margin-top:5px;background:#e74c3c;color:#fff" onclick="sellItem(${index})">ПРОДАТЬ</button>`;
                invGrid.appendChild(div);
            });
        }

        function selectForUpgrade(index) {
            selectedForUpgrade = { ...inventory[index], index };
            document.getElementById('upgradeSlot').innerHTML = `<img src="${selectedForUpgrade.img}">`;
            const chance = selectedForUpgrade.rarity === 'common' ? 10 : 25;
            const zone = document.getElementById('successZone');
            zone.style.width = chance + '%';
            zone.style.left = (50 - chance/2) + '%'; // Зеленая зона по центру
            document.getElementById('chanceLabel').innerText = `Шанс: ${chance}%`;
            document.getElementById('upgradeBtn').disabled = false;
            switchTab('upgrade', document.querySelector('.center-btn'));
        }

        function processUpgrade() {
            const btn = document.getElementById('upgradeBtn'); btn.disabled = true;
            const pointer = document.getElementById('pointer');
            let pos = 0; let speed = 2; let startTime = Date.now();

            function animate() {
                pos += speed; if (pos > 100 || pos < 0) speed *= -1;
                pointer.style.left = pos + '%';
                if (Date.now() - startTime < 3000) { requestAnimationFrame(animate); } 
                else { finishUpgrade(pos); }
            }
            animate();
        }

        function finishUpgrade(finalPos) {
            const chance = selectedForUpgrade.rarity === 'common' ? 10 : 25;
            const leftBound = 50 - chance/2;
            const rightBound = 50 + chance/2;

            if (finalPos >= leftBound && finalPos <= rightBound) {
                inventory[selectedForUpgrade.index] = { ...itemsConfig[2] };
                alert("УСПЕХ! EPIC ВАШ! 🔥");
            } else {
                inventory.splice(selectedForUpgrade.index, 1);
                alert("ПРОВАЛ... Предмет сгорел 💨");
            }
            selectedForUpgrade = null;
            document.getElementById('upgradeSlot').innerHTML = '<span>Выбери предмет</span>';
            document.getElementById('upgradeBtn').disabled = true;
            document.getElementById('successZone').style.width = '0%';
            renderInventory();
        }

        function sellItem(index) { stars += inventory[index].price; inventory.splice(index, 1); updateStars(); renderInventory(); }
        function updateStars() { document.getElementById('starCount').innerText = stars; }
        buildTape();
    </script>
</body>
</html>
