<style>
    /* Стиль карточки как на скрине */
    .menu-card {
        width: 100%;
        height: 100px;
        border-radius: 30px;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        padding: 0 20px;
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        transition: transform 0.2s;
    }
    .menu-card:active { transform: scale(0.97); }

    /* Градиенты для карточек */
    .card-roulette { background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%); }
    .card-upgrade { background: linear-gradient(90deg, #d35400 0%, #e67e22 100%); }

    .card-text {
        margin-left: 20px;
    }
    .card-title {
        font-size: 22px;
        font-weight: bold;
        display: block;
    }
    .card-subtitle {
        font-size: 14px;
        opacity: 0.7;
    }

    /* Иконка внутри карточки */
    .card-icon {
        width: 60px;
        height: 60px;
        object-fit: contain;
    }
</style>

<div class="app-container">
    
    <div class="menu-card card-roulette" onclick="openRoulette()">
        <img src="icon_gift.png" class="card-icon"> <div class="card-text">
            <span class="card-title">Рулетка</span>
            <span class="card-subtitle">14 кейсов</span>
        </div>
    </div>

    <div class="menu-card card-upgrade" onclick="openUpgrade()">
        <img src="icon_up.png" class="card-icon"> <div class="card-text">
            <span class="card-title">Апгрейд</span>
            <span class="card-subtitle">Улучши вещи</span>
        </div>
    </div>

</div>
