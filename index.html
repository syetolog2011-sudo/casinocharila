<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Star Pro</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; font-family: 'Segoe UI', sans-serif;
            color: white; overflow: hidden; display: flex; flex-direction: column;
        }

        /* ГРАДИЕНТ СВЕРХУ (не заходит на ракету) */
        .game-section {
            flex: 1; position: relative; background: #000;
            display: flex; flex-direction: column; align-items: center;
            background: linear-gradient(180deg, rgba(43, 10, 77, 0.5) 0%, rgba(0, 0, 0, 0) 30%);
        }

        .top-container {
            padding-top: 15px; text-align: center; z-index: 10; width: 100%;
        }

        .stars-balance { font-size: 22px; font-weight: bold; color: #ffcc00; margin-bottom: 8px; }

        /* ИСТОРИЯ ИКСОВ */
        .history-row { display: flex; gap: 8px; justify-content: center; opacity: 0.8; }
        .hist-chip { 
            background: rgba(255, 255, 255, 0.1); padding: 3px 10px; 
            border-radius: 12px; font-size: 11px; color: #aaa; border: 1px solid rgba(255,255,255,0.05);
        }

        .multiplier-container { 
            position: absolute; top: 22%; text-align: center; z-index: 5; 
        }
        .multiplier { font-size: 80px; font-weight: 900; letter-spacing: -2px; }
        .status-text { color: #ff4d4d; font-size: 22px; font-weight: bold; margin-top: 5px; display: none; }

        /* РАКЕТА НИЖЕ ЦЕНТРА */
        .rocket-box { 
            width: 170px; height: 170px; z-index: 4; display: none; 
            position: absolute; top: 58%; transform: translateY(-50%);
        }
        .rocket-box video { width: 100%; height: 100%; object-fit: contain; }

        /* ОЖИДАНИЕ */
        .wait-container { 
            position: absolute; top: 50%; width: 70%; text-align: center; z-index: 6; 
        }
        .progress-bar { width: 100%; height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { width: 0%; height: 100%; background: #a347ff; transition: width 0.1s linear; }

        /* ПАНЕЛЬ УПРАВЛЕНИЯ */
        .controls-section {
            background: linear-gradient(180deg, #161618 0%, #000 100%);
            border-top: 1px solid #222; padding: 25px 20px 40px; z-index: 10;
            border-radius: 30px 30px 0 0;
        }

        .main-btn {
            width: 100%; padding: 18px; border-radius: 16px; border: none;
            font-size: 20px; font-weight: bold; color: white;
            background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
            margin-bottom: 20px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(106, 17, 203, 0.3);
        }
        .btn-green { background: #4cd137 !important; color: #000; box-shadow: 0 4px 15px rgba(76, 209, 55, 0.3); }
        .btn-gray { background: #333 !important; cursor: not-allowed; box-shadow: none; opacity: 0.6; }

        .settings-grid { display: flex; flex-direction: column; gap: 12px; }
        .input-box {
            background: rgba(255, 255, 255, 0.04); border-radius: 14px; padding: 12px 15px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ТЕКСТ В СЕРЕДИНЕ ИНПУТА */
        .input-box input { 
            background: transparent; border: none; color: white; font-size: 18px; 
            width: 100%; outline: none; text-align: center; font-weight: bold;
        }
        
        .label-text { font-size: 14px; color: #777; white-space: nowrap; }
        .disabled-ui { opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

    <div class="game-section">
        <div class="top-container">
            <div class="stars-balance" id="balance">100 ⭐</div>
            <div class="history-row" id="history">
                <div class="hist-chip">1.25x</div>
                <div class="hist-chip">2.10x</div>
                <div class="hist-chip">1.01x</div>
                <div class="hist-chip">4.50x</div>
                <div class="hist-chip">1.88x</div>
            </div>
        </div>

        <div class="multiplier-container">
            <div class="multiplier" id="mult">1.00x</div>
            <div class="status-text" id="status">Улетела</div>
        </div>

        <div class="wait-container" id="wait-box">
            <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
            <div style="font-size: 12px; color: #555; letter-spacing: 1px;">ОЖИДАНИЕ...</div>
        </div>

        <div class="rocket-box" id="rocket">
            <video id="vid" loop muted playsinline><source src="13879313762885.mp4" type="video/mp4"></video>
        </div>
    </div>

    <div class="controls-section">
        <button class="main-btn" id="main-btn">СТАВКА</button>
        
        <div class="settings-grid" id="ui-block">
            <div class="input-box">
                <input type="checkbox" id="auto-enabled" style="width: 18px; height: 18px; margin-right: 10px;">
                <span class="label-text">Авто-вывод</span>
                <input type="number" id="auto-val" value="2.0" step="0.1">
            </div>
            
            <div class="input-box">
                <span class="label-text">Сумма ставки</span>
                <input type="number" id="bet-sum" value="10">
                <span style="color: #ffcc00; font-size: 14px;">⭐</span>
            </div>
        </div>
    </div>

<script>
    let stars = 100;
    let isFlying = false;
    let betPlaced = false;
    let currentX = 1.00;
    let gameLoop;
    let history = [1.25, 2.10, 1.01, 4.50, 1.88];

    const els = {
        btn: document.getElementById('main-btn'),
        mult: document.getElementById('mult'),
        status: document.getElementById('status'),
        rocket: document.getElementById('rocket'),
        vid: document.getElementById('vid'),
        wait: document.getElementById('wait-box'),
        fill: document.getElementById('fill'),
        ui: document.getElementById('ui-block'),
        bal: document.getElementById('balance'),
        betInp: document.getElementById('bet-sum'),
        autoCheck: document.getElementById('auto-enabled'),
        autoVal: document.getElementById('auto-val'),
        hist: document.getElementById('history')
    };

    function updateHistory(val) {
        history.unshift(val);
        history = history.slice(0, 5);
        els.hist.innerHTML = history.map(x => `<div class="hist-chip">${x.toFixed(2)}x</div>`).join('');
    }

    function initWait() {
        isFlying = false;
        betPlaced = false;
        els.wait.style.display = 'block';
        els.rocket.style.display = 'none';
        els.mult.style.display = 'none';
        els.status.style.display = 'none';
        els.ui.classList.remove('disabled-ui');
        
        els.btn.innerText = 'СТАВКА';
        els.btn.className = 'main-btn';
        els.btn.onclick = placeBet;

        let progress = 0;
        let timer = setInterval(() => {
            progress += 2; 
            els.fill.style.width = progress + '%';
            if(progress >= 100) {
                clearInterval(timer);
                startFlight();
            }
        }, 100);
    }

    function placeBet() {
        let sum = parseInt(els.betInp.value);
        if(sum > stars) { alert("Недостаточно звезд!"); return; }
        stars -= sum;
        els.bal.innerText = stars + ' ⭐';
        betPlaced = true;
        els.btn.innerText = 'СТАВКА ПРИНЯТА';
        els.btn.classList.add('btn-gray');
        els.btn.onclick = null;
    }

    function startFlight() {
        isFlying = true;
        els.wait.style.display = 'none';
        els.rocket.style.display = 'block';
        els.mult.style.display = 'block';
        els.mult.style.color = 'white';
        els.vid.play();
        els.ui.classList.add('disabled-ui');

        if(betPlaced) {
            els.btn.innerText = 'ЗАБРАТЬ';
            els.btn.className = 'main-btn btn-green';
            els.btn.onclick = cashOut;
        } else {
            els.btn.innerText = 'ПОЛЕТ...';
            els.btn.className = 'main-btn btn-gray';
        }

        currentX = 1.00;
        let crashPoint = (Math.random() > 0.8) ? (1.01 + Math.random() * 0.5) : (1.2 + Math.random() * 6);

        gameLoop = setInterval(() => {
            currentX += 0.01 + (currentX * 0.009);
            els.mult.innerText = currentX.toFixed(2) + 'x';
            
            if(betPlaced && els.autoCheck.checked) {
                if(currentX >= parseFloat(els.autoVal.value)) cashOut();
            }

            if(currentX >= crashPoint) boom();
        }, 80);
    }

    function cashOut() {
        if(!betPlaced) return;
        let win = Math.floor(parseInt(els.betInp.value) * currentX);
        stars += win;
        els.bal.innerText = stars + ' ⭐';
        betPlaced = false;
        els.btn.innerText = 'ВЫПЛАТА ПОЛУЧЕНА';
        els.btn.className = 'main-btn btn-gray';
        els.btn.onclick = null;
    }

    function boom() {
        clearInterval(gameLoop);
        els.vid.pause();
        els.mult.style.color = '#ff4d4d';
        els.status.style.display = 'block';
        els.btn.innerText = 'УЛЕТЕЛА';
        els.btn.className = 'main-btn btn-gray';
        updateHistory(currentX);
        setTimeout(initWait, 3000);
    }

    initWait();
</script>
</body>
</html>
