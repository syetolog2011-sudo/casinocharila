<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Star</title>
    <style>
        /* ИДЕАЛЬНО ЧЕРНЫЙ ФОН */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; /* Абсолютно черный */
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white; overflow: hidden;
        }

        .app-container {
            display: flex; flex-direction: column; height: 100vh;
            background: #000; /* Убираем градиенты, чтобы видео слилось с фоном */
            position: relative;
        }

        /* ЭФФЕКТ СВЕЧЕНИЯ СВЕРХУ */
        .glow-top {
            position: absolute; top: -100px; left: 50%;
            width: 300px; height: 300px;
            background: rgba(163, 71, 255, 0.2);
            filter: blur(80px); transform: translateX(-50%);
            z-index: 1; pointer-events: none;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .header { padding: 10px 15px; z-index: 10; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .user-info { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #aaa; }
        .balance-badge {
            background: #1a1a1a; padding: 5px 12px; border-radius: 20px;
            display: flex; align-items: center; gap: 5px; font-weight: bold; color: #fff;
        }

        /* ИСТОРИЯ */
        .history-row { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; }
        .hist-item {
            background: #111; padding: 4px 12px; border-radius: 8px;
            font-size: 12px; color: #666; border: 1px solid #222;
        }

        /* ИГРОВАЯ ЗОНА */
        .game-area {
            flex: 1; position: relative;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 5;
        }

        /* ЭФФЕКТ ДЛЯ ИКСОВ */
        .multiplier {
            font-size: 70px; font-weight: 900; margin-bottom: 5px;
            color: #fff;
            text-shadow: 0 0 20px rgba(163, 71, 255, 0.8), 0 0 40px rgba(163, 71, 255, 0.4);
            z-index: 10;
            transition: transform 0.1s ease;
        }

        /* КОНТЕЙНЕР РАКЕТЫ */
        .rocket-container {
            width: 220px; height: 220px;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }
        
        .rocket-container video {
            width: 100%; height: 100%; object-fit: contain;
            /* mix-blend-mode: screen; — убираем, если фон видео уже черный, так будет четче */
        }

        /* ЭФФЕКТ НЕОНОВОЙ СЕТКИ */
        .grid-floor {
            position: absolute; bottom: 0; width: 200%; height: 35%;
            background-image: 
                linear-gradient(rgba(163, 71, 255, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(163, 71, 255, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(70deg); transform-origin: bottom;
            left: -50%; z-index: 1;
            mask-image: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0));
        }

        /* ПАНЕЛЬ СТАВОК */
        .bottom-panel {
            background: #0a0a0a; border-radius: 24px 24px 0 0;
            padding: 20px; z-index: 10; border-top: 1px solid #1a1a1a;
        }

        .main-btn {
            background: linear-gradient(90deg, #8e2de2 0%, #4a00e0 100%);
            border: none; border-radius: 16px; color: white;
            padding: 18px; font-size: 18px; font-weight: bold;
            width: 100%; margin-bottom: 20px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(74, 0, 224, 0.3);
        }

        .bet-input-box {
            background: #141414; border-radius: 14px; padding: 15px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 15px; border: 1px solid #222;
        }
        .bet-input-box input {
            background: transparent; border: none; color: white;
            font-size: 20px; width: 60%; outline: none;
        }

        .quick-bets { display: flex; gap: 8px; }
        .q-btn {
            background: #1a1a1a; border: 1px solid #333; color: white;
            flex: 1; padding: 10px; border-radius: 10px; font-size: 14px;
        }

        /* МЕНЮ */
        .tab-bar {
            display: flex; justify-content: space-around; padding: 10px 0;
            background: #000; border-top: 1px solid #111;
        }
        .tab-item { font-size: 10px; color: #444; text-align: center; }
        .tab-item.active { color: #a347ff; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="glow-top"></div>

    <div class="header">
        <div class="top-nav">
            <div class="user-info">← Назад <span>Даниил</span></div>
            <div class="balance-badge">0 💎</div>
        </div>
        <div class="history-row">
            <div class="hist-item">1.28x</div>
            <div class="hist-item">1.94x</div>
            <div class="hist-item">1.51x</div>
            <div class="hist-item">2.60x</div>
            <div class="hist-item" style="color: #a347ff; border-color: #a347ff;">3.41x</div>
        </div>
    </div>

    <div class="game-area">
        <div class="multiplier" id="mult-text">1.00x</div>
        <div class="rocket-container">
            <video id="rocket-vid" autoplay loop muted playsinline>
                <source src="13879192062533.mp4" type="video/mp4">
            </video>
        </div>
        <div class="grid-floor"></div>
    </div>

    <div class="bottom-panel">
        <button class="main-btn" id="main-action" onclick="handleBtn()">Ожидание.</button>
        
        <div class="bet-input-box">
            <input type="number" id="bet-amount" value="1">
            <span style="color: #5fb4f8;">💎</span>
        </div>

        <div class="quick-bets">
            <button class="q-btn" onclick="setBet(1)">+1 💎</button>
            <button class="q-btn" onclick="setBet(5)">+5 💎</button>
            <button class="q-btn" onclick="setBet(10)">+10 💎</button>
            <button class="q-btn" onclick="setBet(15)">+15 💎</button>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item">🏆<br>Лидерборд</div>
        <div class="tab-item active">🎮<br>Играть</div>
        <div class="tab-item">⚡<br>Задания</div>
        <div class="tab-item">👤<br>Profile</div>
    </div>
</div>

<script>
    let isPlaying = false;
    let currentX = 1.00;
    let gameInterval;

    function setBet(val) {
        let input = document.getElementById('bet-amount');
        input.value = parseInt(input.value) + val;
    }

    function handleBtn() {
        if (!isPlaying) {
            startLevel();
        } else {
            cashOut();
        }
    }

    function startLevel() {
        isPlaying = true;
        currentX = 1.00;
        const btn = document.getElementById('main-action');
        const text = document.getElementById('mult-text');
        
        btn.innerText = 'Забрать';
        btn.style.background = '#4cd137';
        text.style.color = 'white';
        text.style.transform = 'scale(1.2)';

        gameInterval = setInterval(() => {
            currentX += 0.01 + (currentX * 0.003);
            text.innerText = currentX.toFixed(2) + 'x';

            if (Math.random() < 0.015) {
                crash();
            }
        }, 100);
    }

    function crash() {
        clearInterval(gameInterval);
        isPlaying = false;
        const btn = document.getElementById('main-action');
        const text = document.getElementById('mult-text');

        text.style.color = '#ff4d4d';
        text.innerText = 'BOOM!';
        text.style.transform = 'scale(1)';
        
        btn.innerText = 'Ожидание.';
        btn.style.background = 'linear-gradient(90deg, #8e2de2 0%, #4a00e0 100%)';
    }

    function cashOut() {
        clearInterval(gameInterval);
        isPlaying = false;
        alert('Вы забрали: ' + currentX.toFixed(2) + 'x');
        
        const btn = document.getElementById('main-action');
        const text = document.getElementById('mult-text');
        text.style.transform = 'scale(1)';
        btn.innerText = 'Ожидание.';
        btn.style.background = 'linear-gradient(90deg, #8e2de2 0%, #4a00e0 100%)';
    }
</script>

</body>
</html>
