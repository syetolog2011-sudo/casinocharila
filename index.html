<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Кейса</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .case-container {
            background: linear-gradient(145deg, #2c2c2c, #1e1e1e);
            border: 2px solid #444;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 250px;
        }

        .item-image {
            width: 100%;
            height: auto;
            /* Добавляем свечение, чтобы выглядело как в игре */
            filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.4));
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .item-image:hover {
            transform: scale(1.1);
        }

        .item-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #00d2ff;
        }

        .open-btn {
            background: #00d2ff;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            color: #1a1a1a;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="case-container">
        <img src="https://storage.portal-market.com/portals-market/gifts/chillflame/models/png/losangeles.png" 
             alt="L.A. Item" 
             class="item-image">
        
        <div class="item-name">L.A. Chill</div>
        <button class="open-btn">ОТКРЫТЬ КЕЙС</button>
    </div>

</body>
</html>
