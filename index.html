<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Mobile Game</title>
    <style>
        body {
            background-color: #000033;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }

        .header { width: 100%; padding: 20px 0; display: flex; justify-content: center; }
        
        /* Рамка для отладки: если картинки нет, будет видно блок */
        .game-btn {
            width: 85%;
            max-width: 380px;
            margin-bottom: 20px;
            cursor: pointer;
            border-radius: 25px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            min-height: 120px; /* Чтобы рамка была видна сразу */
            border: 1px dashed rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-btn img {
            width: 100%;
            height: auto;
            display: block;
        }

        .game-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div class="header">
        <img src="image_3afed4.png" style="width:110px;" alt="Баланс">
    </div>

    <div class="game-btn">
        <img src="rulekta.png" alt="Рулетка" id="img-rulekta">
    </div>

    <div class="game-btn">
        <img src="apgrade.png" alt="Апгрейд" id="img-apgrade">
    </div>

    <script>
        // СКРИПТ-ПОМОЩНИК: Если картинка не нашлась, он попробует другие варианты имен
        function checkImage(id, names) {
            let img = document.getElementById(id);
            let index = 0;
            img.onerror = function() {
                if (index < names.length) {
                    console.log("Пробую другое имя для " + id + ": " + names[index]);
                    this.src = names[index];
                    index++;
                }
            };
        }

        // Проверяем Рулетку (английская и русская 'р', разные расширения)
        checkImage('img-rulekta', ['rulekta.PNG', 'rulekta.jpg', 'Рулетка.png']);
        
        // Проверяем Апгрейд (английская и русская 'а', 'u' вместо 'a')
        checkImage('img-apgrade', ['apgrade.PNG', 'upgrade.png', 'Апгрейд.png', 'apgrade.png']);
    </script>
</body>
</html>
